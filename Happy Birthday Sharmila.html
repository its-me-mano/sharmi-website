<style>
  :root {
    /* deep & moody — navy / black / gold */
    --bg-0: oklch(0.13 0.025 270);
    --bg-1: oklch(0.09 0.02 270);
    --bg-2: oklch(0.16 0.03 280);
    --ink:  oklch(0.95 0.012 90);
    --muted: oklch(0.74 0.02 280);
    --gold: oklch(0.83 0.105 86);
    --gold-bright: oklch(0.90 0.11 90);
    --gold-deep: oklch(0.68 0.10 78);
    --rose: oklch(0.80 0.07 20);
    --line: oklch(0.83 0.105 86 / 0.22);

    --serif: "Cormorant Garamond", Georgia, serif;
    --script: "Great Vibes", cursive;
    --sans: "Outfit", system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-1);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  body { scroll-behavior: smooth; }

  #ambient-canvas, #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
  }
  #confetti-canvas { z-index: 60; }

  #root { position: relative; z-index: 1; }

  .scene {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(28px, 6vw, 90px) clamp(20px, 5vw, 80px);
    overflow: hidden;
  }

  /* vignette + grain via background layers */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% -10%, oklch(0.22 0.04 280 / 0.7), transparent 60%),
      radial-gradient(100% 90% at 50% 120%, oklch(0.18 0.05 300 / 0.55), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0) 55%, var(--bg-1));
  }

  .eyebrow {
    font-family: var(--sans);
    font-weight: 400;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    font-size: clamp(10px, 1.1vw, 13px);
    color: var(--gold);
    opacity: 0.85;
  }

  .scroll-cue {
    position: absolute;
    bottom: clamp(20px, 4vh, 42px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: floaty 2.4s ease-in-out infinite;
  }
  .scroll-cue .dot {
    width: 22px; height: 34px;
    border: 1px solid var(--line);
    border-radius: 12px;
    position: relative;
  }
  .scroll-cue .dot::after {
    content: "";
    position: absolute;
    top: 7px; left: 50%;
    width: 3px; height: 7px;
    margin-left: -1.5px;
    border-radius: 2px;
    background: var(--gold);
    animation: wheel 1.8s ease-in-out infinite;
  }
  @keyframes wheel { 0%{opacity:0;transform:translateY(0)} 40%{opacity:1} 100%{opacity:0;transform:translateY(12px)} }
  @keyframes floaty { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* image-slot theming */
  image-slot {
    --is-bg: oklch(0.2 0.03 280);
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.8), 0 0 0 1px var(--line) inset;
  }

  ::selection { background: var(--gold); color: var(--bg-0); }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.2s !important; }
  }

  /* ===================================================================== */
  /* components.css — gallery, candle, scenes, intro                       */
  /* ===================================================================== */

  /* ===== Photo frames ===== */
  .photo-frame { display: flex; flex-direction: column; gap: 12px; }
  .photo-mat {
    position: relative;
    padding: 7px;
    background: linear-gradient(160deg, oklch(0.86 0.10 88), oklch(0.62 0.09 70) 55%, oklch(0.8 0.1 86));
    border-radius: 16px;
    box-shadow: 0 34px 70px -30px rgba(0,0,0,0.85), 0 2px 0 oklch(0.95 0.06 90 / 0.5) inset;
  }
  .photo-mat image-slot { border-radius: 10px; overflow: hidden; }
  .photo-gloss {
    position: absolute; inset: 7px;
    border-radius: 10px;
    pointer-events: none;
    background: radial-gradient(120% 80% at var(--gx,30%) var(--gy,20%), oklch(1 0 0 / 0.16), transparent 45%);
    mix-blend-mode: screen;
  }
  .photo-cap { display: flex; flex-direction: column; gap: 3px; text-align: center; }
  .cap-date {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.34em;
    text-transform: uppercase; color: var(--gold); opacity: 0.85;
  }
  .cap-text { font-family: var(--serif); font-style: italic; font-size: clamp(15px, 1.7vw, 20px); color: var(--ink); }

  /* floating bob */
  .float-anim { animation: bob 6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-14px) } }

  /* ===== TILT grid ===== */
  .tilt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: clamp(22px, 3vw, 44px);
    width: min(1180px, 100%);
    perspective: 1200px;
  }
  .tilt-card { transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(.2,.8,.2,1); will-change: transform; cursor: pointer; }

  /* ===== RING carousel ===== */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; }
  .ring-stage {
    position: relative;
    width: min(680px, 92vw);
    height: clamp(300px, 42vh, 460px);
    perspective: 1300px;
    cursor: grab;
    touch-action: pan-y;
  }
  .ring-stage:active { cursor: grabbing; }
  .ring {
    position: absolute; inset: 0; margin: auto;
    width: clamp(180px, 24vw, 300px); height: clamp(230px, 30vw, 380px);
    left: 0; right: 0; top: 0; bottom: 0;
    transform-style: preserve-3d;
  }
  .ring-item {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    backface-visibility: hidden;
  }
  .ring-controls { display: flex; align-items: center; gap: 22px; }
  .ring-btn {
    width: 50px; height: 50px; border-radius: 50%;
    background: oklch(0.2 0.03 280 / 0.6);
    border: 1px solid var(--line);
    color: var(--gold); font-size: 26px; line-height: 1; cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.2s, transform 0.2s;
  }
  .ring-btn:hover { background: oklch(0.26 0.04 280 / 0.8); transform: translateY(-2px); }
  .ring-btn:active { transform: scale(0.94); }
  .ring-cap { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: clamp(180px, 40vw, 320px); text-align: center; }
  .ring-hint { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); opacity: 0.7; }

  /* ===== FLOAT depth field ===== */
  .float-stage {
    position: relative;
    width: min(1100px, 100%);
    height: clamp(440px, 64vh, 640px);
    perspective: 1100px;
  }
  .float-item {
    position: absolute;
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
    will-change: transform;
  }

  /* ===== Scene headings ===== */
  .section-head { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; margin-bottom: clamp(34px, 5vw, 62px); }
  .kicker {
    font-family: var(--sans); font-weight: 400; letter-spacing: 0.42em; text-transform: uppercase;
    font-size: clamp(10px, 1.1vw, 13px); color: var(--gold); opacity: 0.85;
  }
  .title { font-family: var(--serif); font-weight: 500; font-size: clamp(34px, 6vw, 76px); line-height: 1.02; letter-spacing: -0.01em; }
  .title em { font-style: italic; color: var(--gold); }
  .lead { font-family: var(--serif); font-style: italic; font-size: clamp(17px, 2.2vw, 24px); color: var(--muted); max-width: 46ch; text-wrap: pretty; }

  .divider { display: flex; align-items: center; gap: 14px; color: var(--gold); opacity: 0.8; }
  .divider::before, .divider::after { content: ""; height: 1px; width: clamp(40px, 8vw, 90px); background: linear-gradient(90deg, transparent, var(--line)); }
  .divider span { font-size: 13px; }

  /* ===== HERO / intro ===== */
  .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 2.4vw, 26px); }
  /* entrance gated on .started — plays only after the gift is unwrapped */
  .hero-kicker { opacity: 0; }
  .app-stage .hero-kicker { opacity: 0; }
  .app-stage.started .hero-kicker { animation: fadeUp 1s ease 0.2s forwards; }
  .hero-hb {
    font-family: var(--script);
    font-size: clamp(58px, 13vw, 168px);
    line-height: 0.9;
    color: var(--gold);
    filter: drop-shadow(0 8px 30px oklch(0.83 0.105 86 / 0.35));
  }
  .hero-hb .ltr { display: inline-block; opacity: 0; transform: translateY(40px) rotate(8deg); }
  .started .hero-hb .ltr { animation: dropIn 0.8s cubic-bezier(.2,.8,.25,1) forwards; }
  .hero-name {
    font-family: var(--serif); font-weight: 600;
    font-size: clamp(40px, 9vw, 120px); letter-spacing: 0.02em; line-height: 1;
    opacity: 0;
    color: oklch(0.94 0.02 90);
    text-shadow: 0 2px 24px oklch(0.83 0.105 86 / 0.25);
  }
  .started .hero-name { animation: fadeUp 1.1s ease 1.1s forwards; }
  .hero-rule { width: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .started .hero-rule { animation: ruleGrow 1.4s ease 1.5s forwards; }
  .hero-sub { font-family: var(--serif); font-style: italic; font-size: clamp(16px, 2.4vw, 26px); color: var(--muted); opacity: 0; max-width: 40ch; text-wrap: pretty; }
  .started .hero-sub { animation: fadeUp 1.1s ease 1.8s forwards; }

  @keyframes dropIn { to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(26px);} to { opacity: 1; transform: none; } }
  @keyframes ruleGrow { to { width: min(360px, 70vw); } }

  /* ===== Letter / message ===== */
  .letter {
    width: min(760px, 100%);
    background: linear-gradient(170deg, oklch(0.18 0.03 280 / 0.7), oklch(0.13 0.025 275 / 0.7));
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: clamp(34px, 5vw, 70px);
    box-shadow: 0 50px 90px -50px rgba(0,0,0,0.9);
    backdrop-filter: blur(6px);
  }
  .letter-body { font-family: var(--serif); font-size: clamp(19px, 2.5vw, 28px); line-height: 1.6; color: var(--ink); text-wrap: pretty; }
  .letter-body p { margin-bottom: 1em; }
  .letter-body .drop { font-family: var(--script); font-size: 1.7em; color: var(--gold); line-height: 0; }
  .signed { font-family: var(--script); font-size: clamp(30px, 4vw, 48px); color: var(--gold); margin-top: 0.3em; }

  /* ===== Candle / cake ===== */
  .candle-scene { display: flex; flex-direction: column; align-items: center; gap: clamp(26px, 4vw, 44px); }
  .cake-wrap { position: relative; width: 280px; height: 250px; display: flex; align-items: flex-end; justify-content: center; }

  .cake { position: relative; width: 240px; display: flex; flex-direction: column; align-items: center; }
  .tier { position: relative; border-radius: 14px 14px 8px 8px; box-shadow: 0 18px 40px -18px rgba(0,0,0,0.8) inset, 0 -3px 0 oklch(1 0 0 / 0.05) inset; }
  .tier-top { width: 150px; height: 64px; background: linear-gradient(180deg, oklch(0.32 0.06 350), oklch(0.26 0.05 350)); z-index: 2; }
  .tier-bot { width: 220px; height: 80px; margin-top: -6px; background: linear-gradient(180deg, oklch(0.3 0.055 345), oklch(0.23 0.045 345)); z-index: 1; }
  .drip { position: absolute; left: 0; right: 0; top: -2px; height: 22px;
    background:
      radial-gradient(10px 14px at 12% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(12px 18px at 34% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(10px 13px at 56% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(13px 19px at 78% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(10px 14px at 95% 0, oklch(0.86 0.1 88) 60%, transparent 62%);
    border-radius: 14px 14px 0 0;
  }
  .tier-top .drip { background-color: transparent; }
  .sprinkles, .dots { position: absolute; inset: 0; }
  .sprinkles { background-image:
    radial-gradient(2px 2px at 30% 60%, var(--gold) 50%, transparent 52%),
    radial-gradient(2px 2px at 60% 70%, oklch(0.85 0.07 20) 50%, transparent 52%),
    radial-gradient(2px 2px at 78% 50%, var(--gold) 50%, transparent 52%),
    radial-gradient(2px 2px at 45% 80%, oklch(0.8 0.06 280) 50%, transparent 52%); }
  .dots { background-image: radial-gradient(3px 3px at 50% 50%, var(--gold) 50%, transparent 52%); background-size: 40px 40px; opacity: 0.5; }
  .plate { width: 250px; height: 14px; margin-top: -2px; border-radius: 50%; background: linear-gradient(180deg, oklch(0.6 0.02 280), oklch(0.3 0.02 280)); box-shadow: 0 24px 40px -18px rgba(0,0,0,0.9); }

  .candle-stick { position: absolute; left: 50%; top: 30px; transform: translateX(-50%); width: 14px; height: 70px; z-index: 3;
    background: repeating-linear-gradient(45deg, oklch(0.92 0.04 30) 0 6px, oklch(0.78 0.08 25) 6px 12px);
    border-radius: 4px; cursor: pointer; box-shadow: 0 6px 14px -6px rgba(0,0,0,0.7); }
  .wick { position: absolute; left: 50%; top: -8px; transform: translateX(-50%); width: 2px; height: 9px; background: oklch(0.2 0 0); border-radius: 2px; }

  .flame-col { position: absolute; left: 50%; top: 22px; transform: translateX(-50%); z-index: 4; transition: opacity 0.4s; }
  .flame { position: absolute; left: 50%; bottom: 0; transform-origin: bottom center; width: 18px; height: 34px;
    margin-left: -9px;
    transition: transform 0.12s ease; animation: flicker 0.18s ease-in-out infinite alternate; }
  .flame-inner {
    width: 100%; height: 100%;
    background: radial-gradient(60% 60% at 50% 75%, #fff6cf 0%, var(--gold-bright) 35%, oklch(0.7 0.18 50) 75%, oklch(0.55 0.2 35) 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform: scaleX(0.8);
    box-shadow: 0 0 16px 4px oklch(0.85 0.12 70 / 0.7);
  }
  .flame-glow { position: absolute; left: 50%; bottom: -14px; transform: translateX(-50%); width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle, oklch(0.85 0.12 75 / 0.28), transparent 65%); pointer-events: none; animation: glowPulse 2.4s ease-in-out infinite; }
  @keyframes flicker { from { transform: scaleY(0.96) scaleX(1.02);} to { transform: scaleY(1.04) scaleX(0.98);} }
  @keyframes glowPulse { 0%,100%{ opacity: 0.8; transform: translateX(-50%) scale(1);} 50%{ opacity: 1; transform: translateX(-50%) scale(1.12);} }
  .smoke { position: absolute; left: 50%; top: 14px; transform: translateX(-50%); width: 6px; height: 40px; z-index: 4;
    background: linear-gradient(180deg, oklch(0.8 0 0 / 0.4), transparent); border-radius: 50%;
    animation: smoke 1.6s ease-out forwards; filter: blur(2px); }
  @keyframes smoke { 0%{ opacity: 0.6; transform: translateX(-50%) translateY(0) scaleX(1);} 100%{ opacity: 0; transform: translateX(-50%) translateY(-46px) scaleX(2.4);} }

  /* wish UI */
  .wish-ui { display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; }
  .wish-line { font-family: var(--serif); font-style: italic; font-size: clamp(19px, 2.6vw, 28px); color: var(--ink); line-height: 1.4; }
  .wish-line span { color: var(--gold); }
  .wish-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .wish-done { font-family: var(--script); font-size: clamp(34px, 5vw, 56px); color: var(--gold); }
  .btn-ghost {
    font-family: var(--sans); font-size: 14px; letter-spacing: 0.04em;
    padding: 13px 26px; border-radius: 100px; cursor: pointer;
    background: oklch(0.2 0.03 280 / 0.5); color: var(--ink);
    border: 1px solid var(--line); transition: all 0.2s;
  }
  .btn-ghost:hover { background: oklch(0.83 0.105 86 / 0.14); border-color: var(--gold); }
  .btn-link { background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; text-decoration-color: var(--line); }
  .btn-link:hover { color: var(--gold); }
  .mic-live { display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: var(--sans); font-size: 13px; letter-spacing: 0.1em; color: var(--gold); }
  .mic-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rose); box-shadow: 0 0 0 0 oklch(0.8 0.07 20 / 0.6); animation: pulse 1.3s infinite; display: inline-block; }
  @keyframes pulse { 0%{ box-shadow: 0 0 0 0 oklch(0.8 0.07 20 / 0.5);} 70%{ box-shadow: 0 0 0 10px oklch(0.8 0.07 20 / 0);} 100%{ box-shadow: 0 0 0 0 oklch(0.8 0.07 20 / 0);} }
  .mic-meter { width: 180px; height: 6px; border-radius: 4px; background: oklch(0.25 0.02 280); overflow: hidden; }
  .mic-meter i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright)); transition: width 0.08s; }

  /* footer mark */
  .footer-mark { text-align: center; display: flex; flex-direction: column; gap: 8px; align-items: center; padding-top: 20px; }
  .footer-mark .fm-h { font-family: var(--script); font-size: clamp(30px, 4vw, 48px); color: var(--gold); }
  .footer-mark .fm-s { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

  /* ===== Gift unwrap overlay ===== */
  .gift-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 90% at 50% 42%, oklch(0.17 0.03 280 / 0.55), oklch(0.09 0.02 270 / 0.92) 70%),
      oklch(0.09 0.02 270 / 0.86);
    backdrop-filter: blur(2px);
    transition: opacity 0.8s ease 0.85s;
    opacity: 1;
  }
  .gift-overlay.is-opening { opacity: 0; pointer-events: none; }

  .gift-stage {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(40px, 8vh, 80px);
    cursor: pointer;
    padding-top: 70px;
    perspective: 1000px;
  }

  .gift-burst {
    position: absolute; left: 50%; top: 42%; transform: translate(-50%, -50%) scale(0.2);
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, oklch(0.95 0.08 90 / 0.9), oklch(0.85 0.12 80 / 0.4) 35%, transparent 68%);
    opacity: 0; pointer-events: none;
  }
  .is-opening .gift-burst { animation: giftBurst 1.1s ease-out forwards; }
  @keyframes giftBurst {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.2); }
    35% { opacity: 1; transform: translate(-50%,-50%) scale(1.4); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(3.4); }
  }

  .gift-box {
    position: relative;
    width: clamp(170px, 44vw, 230px);
    animation: bob 4.5s ease-in-out infinite;
    transform-style: preserve-3d;
  }
  .is-opening .gift-box { animation: none; }

  /* body */
  .gift-body {
    position: relative;
    width: 100%; height: clamp(120px, 30vw, 158px);
    border-radius: 6px 6px 9px 9px;
    background:
      repeating-linear-gradient(135deg, oklch(0.27 0.055 285) 0 14px, oklch(0.23 0.05 285) 14px 28px);
    box-shadow: 0 40px 70px -34px rgba(0,0,0,0.9), 0 -4px 0 oklch(1 0 0 / 0.04) inset;
    transition: transform 0.9s cubic-bezier(.3,.6,.3,1), opacity 0.8s ease 0.5s;
  }
  .is-opening .gift-body { transform: translateY(34px) scale(0.94); opacity: 0; }
  .body-ribbon {
    position: absolute; top: 0; bottom: 0; left: 50%; width: 30px; transform: translateX(-50%);
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright) 45%, var(--gold-deep));
    box-shadow: 0 0 14px oklch(0.85 0.1 80 / 0.3);
  }
  .body-sheen {
    position: absolute; inset: 0; border-radius: 6px 6px 9px 9px; pointer-events: none;
    background: linear-gradient(110deg, transparent 30%, oklch(1 0 0 / 0.10) 48%, transparent 60%);
  }

  /* lid */
  .gift-lid {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    width: 114%; height: clamp(30px, 7vw, 40px);
    border-radius: 8px 8px 4px 4px;
    background: linear-gradient(180deg, oklch(0.31 0.06 288), oklch(0.24 0.05 286));
    box-shadow: 0 16px 30px -16px rgba(0,0,0,0.8), 0 -3px 0 oklch(1 0 0 / 0.06) inset;
    transition: transform 1s cubic-bezier(.3,.5,.2,1), opacity 0.7s ease 0.45s;
    z-index: 3;
  }
  .is-opening .gift-lid { transform: translateX(-50%) translateY(-220px) rotate(-16deg); opacity: 0; }
  .lid-ribbon {
    position: absolute; top: 0; bottom: 0; left: 50%; width: 30px; transform: translateX(-50%);
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright) 45%, var(--gold-deep));
  }

  /* bow */
  .gift-bow {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 30px; z-index: 4;
  }
  .bow-loop {
    position: absolute; top: 2px; width: 34px; height: 26px;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold-deep));
    box-shadow: 0 2px 6px rgba(0,0,0,0.35) inset, 0 3px 8px -4px rgba(0,0,0,0.6);
  }
  .bow-l { left: 2px; border-radius: 60% 30% 50% 60% / 70% 40% 60% 50%; transform: rotate(-6deg); }
  .bow-r { right: 2px; border-radius: 30% 60% 60% 50% / 40% 70% 50% 60%; transform: rotate(6deg); }
  .bow-knot {
    position: absolute; left: 50%; top: 6px; transform: translateX(-50%);
    width: 16px; height: 18px; border-radius: 5px; z-index: 2;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
    box-shadow: 0 2px 5px rgba(0,0,0,0.4);
  }
  .bow-tail {
    position: absolute; top: 20px; width: 12px; height: 26px;
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
  }
  .bow-tl { left: 28px; transform: skewX(14deg) rotate(6deg); border-radius: 0 0 4px 8px; }
  .bow-tr { right: 28px; transform: skewX(-14deg) rotate(-6deg); border-radius: 0 0 8px 4px; }
  .is-opening .gift-bow { transition: transform 0.5s ease, opacity 0.5s ease; transform: translateX(-50%) translateY(-40px) scale(1.3); opacity: 0; }

  /* tag */
  .gift-tag {
    position: absolute; top: -54px; right: -34px;
    display: flex; flex-direction: column; gap: 4px;
    padding: 13px 17px; border-radius: 4px; min-width: 122px;
    background: linear-gradient(160deg, oklch(0.93 0.02 90), oklch(0.86 0.03 88));
    color: oklch(0.28 0.04 285);
    box-shadow: 0 14px 26px -14px rgba(0,0,0,0.7);
    transform: rotate(7deg);
    z-index: 5;
    transition: opacity 0.5s ease;
  }
  .gift-tag::before {
    content: ""; position: absolute; top: -26px; right: 16px;
    width: 1px; height: 30px; background: var(--line);
    transform: rotate(18deg); transform-origin: bottom;
  }
  .gift-tag::after {
    content: ""; position: absolute; top: 7px; right: 10px;
    width: 7px; height: 7px; border-radius: 50%;
    border: 1.5px solid oklch(0.5 0.04 285); background: transparent;
  }
  .is-opening .gift-tag { opacity: 0; }
  .gt-no { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; color: var(--gold-deep); }
  .gt-no i { font-style: normal; opacity: 0.6; }
  .gt-to { font-family: var(--script); font-size: 26px; line-height: 1.05; color: oklch(0.3 0.05 350); white-space: nowrap; margin: 1px 0; }
  .gt-line { font-family: var(--serif); font-style: italic; font-size: 12px; color: oklch(0.4 0.03 285); }

  /* prompt */
  .gift-prompt { display: flex; flex-direction: column; align-items: center; gap: 9px; text-align: center; animation: promptFloat 2.6s ease-in-out infinite; }
  @keyframes promptFloat { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-7px) } }
  .is-opening .gift-prompt { animation: none; opacity: 0; transition: opacity 0.4s; }
  .gp-main { font-family: var(--serif); font-style: italic; font-size: clamp(20px, 3vw, 28px); color: var(--ink); white-space: nowrap; }
  .gp-sub { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); opacity: 0.8; }

  @media (max-width: 600px) {
    .ring-cap { min-width: 70vw; }
    .tilt-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    .gift-tag { right: -14px; }
  }

  /* ===================================================================== */
  /* Tweaks panel (adapted from tweaks-panel.jsx — host protocol replaced   */
  /* with a local toggle + localStorage persistence)                       */
  /* ===================================================================== */
  .twk-fab { position: fixed; right: 16px; bottom: 16px; z-index: 90;
    width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
    cursor: pointer; border: 1px solid var(--line); color: var(--gold);
    background: oklch(0.2 0.03 280 / 0.55); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.7); opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s; }
  .twk-fab:hover { opacity: 1; transform: translateY(-2px); }
  .twk-fab svg { width: 20px; height: 20px; }

  /* fullscreen toggle (bottom-left), mirrors the tweaks fab */
  .proj-fab { position: fixed; left: 16px; bottom: 16px; z-index: 90;
    width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
    cursor: pointer; border: 1px solid var(--line); color: var(--gold);
    background: oklch(0.2 0.03 280 / 0.55); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.7); opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s; }
  .proj-fab:hover { opacity: 1; transform: translateY(-2px); }
  .proj-fab svg { width: 19px; height: 19px; }

  /* presenting: hide cursor + controls when idle so the reveal stays clean */
  body.idle, body.idle * { cursor: none !important; }
  body.idle .twk-fab, body.idle .proj-fab { opacity: 0; pointer-events: none; }

      h('p', {}, "Every photo here is a small piece of how lucky I feel. Here's to more sunsets, more silly arguments over nothing, and a lifetime of birthdays I get to spend beside you."),
      h('p', {}, "Happy birthday, my love. Make a wish — I'll spend forever helping it come true."),
      h('div', { class: 'signed' }, 'Always yours'));
    return h('section', { class: 'scene', 'data-screen-label': 'Letter' },
      h('div', { class: 'section-head reveal' },
        h('div', { class: 'divider' }, h('span', {}, '✦')),
        h('h2', { class: 'title', html: 'A few <em>words</em>' })),
      h('div', { class: 'letter reveal' }, body));
  }
  function CandleScene() {
    var candleHost = h('div', { class: 'reveal' });
    mountCandle(candleHost);
    refs.footerName = h('span', {}, T.name);
    var fmH = h('div', { class: 'fm-h' }, 'Happy Birthday, ', refs.footerName);
    return h('section', { class: 'scene', 'data-screen-label': 'Wish' },
      h('div', { class: 'section-head reveal' },
        h('span', { class: 'kicker' }, 'One last thing'),
        h('h2', { class: 'title', html: 'Make a <em>wish</em>' })),
      candleHost,
      h('div', { class: 'footer-mark reveal', style: { marginTop: 'clamp(34px,6vw,70px)' } },
        fmH, h('div', { class: 'fm-s' }, 'made with love · 09 June')));
  }

  /* ---------- Live tweak application (in place, no full re-render) ---------- */
  function remountGallery() {
    if (galleryTeardown) galleryTeardown();
    galleryTeardown = mountGallery(refs.galleryHost, T.mode, PHOTOS);
  }
  function toggleRain(on) {
    if (on) {
      if (rainInterval) return;
      rainInterval = setInterval(function () { window.rainConfetti && window.rainConfetti(8); }, 700);
    } else if (rainInterval) { clearInterval(rainInterval); rainInterval = null; }
  }
  function applyTweak(key, val) {
    T[key] = val;
    saveTweaks();
    if (key === 'accent') document.documentElement.style.setProperty('--gold', val);
    else if (key === 'mode') remountGallery();
    else if (key === 'name') {
      if (refs.heroName) refs.heroName.textContent = val;
      if (refs.letterName) refs.letterName.textContent = val;
      if (refs.footerName) refs.footerName.textContent = val;
      if (refs.fillGiftTag) refs.fillGiftTag();
    }
    else if (key === 'greeting') buildHbLetters(refs.heroHb, val);
    else if (key === 'subtitle') refs.heroSub.textContent = val;
    else if (key === 'giftNo' || key === 'giftTotal' || key === 'tagLine') {
      if (refs.fillGiftTag) refs.fillGiftTag();
    }
    else if (key === 'confettiRain') toggleRain(val);
  }

  /* ---------- Reveal-on-scroll ---------- */
  function setupReveal() {
    var els = document.querySelectorAll('.reveal');
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    els.forEach(function (el) { io.observe(el); });
    setTimeout(function () { els.forEach(function (el) { el.classList.add('in'); }); }, 2500);
  }

  /* ---------- Tweaks panel (local toggle, no design-tool host) ---------- */
  function isLight(hex) {
    var s = String(hex).replace('#', '');
    var x = s.length === 3 ? s.replace(/./g, function (c) { return c + c; }) : (s + '000000').slice(0, 6);
    var nn = parseInt(x, 16);
    if (isNaN(nn)) return true;
    var r = (nn >> 16) & 255, g = (nn >> 8) & 255, b = nn & 255;
    return r * 299 + g * 587 + b * 114 > 148000;
  }
  function twkSection(label) { return h('div', { class: 'twk-sect' }, label); }
  function twkRow(label, control) {
    return h('div', { class: 'twk-row' },
      h('div', { class: 'twk-lbl' }, h('span', {}, label)), control);
  }
  function twkNumber(label, key, min, max) {
    var input = h('input', { type: 'number', value: T[key], min: min, max: max, step: 1 });
    function clamp(v) { return v < min ? min : v > max ? max : v; }
    input.addEventListener('change', function () {
      var v = clamp(Number(input.value) || min); input.value = v; applyTweak(key, v);
    });
    var lbl = h('span', { class: 'twk-num-lbl' }, label);
    lbl.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      var sx = e.clientX, sv = Number(input.value) || min;
      function move(ev) {
        var v = clamp(Math.round(sv + (ev.clientX - sx) * 0.25));
        input.value = v; applyTweak(key, v);
      }
      function up() { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); }
      window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
    });
    return h('div', { class: 'twk-num' }, lbl, input);
  }
  function twkText(label, key) {
    var input = h('input', { class: 'twk-field', type: 'text', value: T[key] });
    input.addEventListener('input', function () { applyTweak(key, input.value); });
    return twkRow(label, input);
  }
  function twkRadio(label, key, options) {
    var n = options.length;
    var thumb = h('div', { class: 'twk-seg-thumb' });
    var seg = h('div', { class: 'twk-seg', role: 'radiogroup' }, thumb);
    function place() {
      var idx = Math.max(0, options.indexOf(T[key]));
      thumb.style.left = 'calc(2px + ' + idx + ' * (100% - 4px) / ' + n + ')';
      thumb.style.width = 'calc((100% - 4px) / ' + n + ')';
    }
    options.forEach(function (o) {
      var b = h('button', { type: 'button', role: 'radio' }, o);
      b.addEventListener('click', function () { applyTweak(key, o); place(); });
      seg.appendChild(b);
    });
    place();
    return twkRow(label, seg);
  }
  function twkColor(label, key, options) {
    var chips = h('div', { class: 'twk-chips', role: 'radiogroup' });
    function refresh() {
      Array.prototype.forEach.call(chips.children, function (c) {
        c.setAttribute('data-on', c.dataset.val === T[key] ? '1' : '0');
        var existing = c.querySelector('svg');
        if (c.dataset.val === T[key]) {
          if (!existing) {
            c.insertAdjacentHTML('beforeend',
              '<svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke="' +
              (isLight(c.dataset.val) ? 'rgba(0,0,0,.78)' : '#fff') + '"/></svg>');
          }
        } else if (existing) existing.remove();
      });
    }
    options.forEach(function (hex) {
      var chip = h('button', { type: 'button', class: 'twk-chip', role: 'radio',
        title: hex, style: { background: hex } });
      chip.dataset.val = hex;
      chip.addEventListener('click', function () { applyTweak(key, hex); refresh(); });
      chips.appendChild(chip);
    });
    refresh();
    return twkRow(label, chips);
  }
  function twkToggle(label, key) {
    var btn = h('button', { type: 'button', class: 'twk-toggle', role: 'switch',
      'data-on': T[key] ? '1' : '0' }, h('i', {}));
    btn.addEventListener('click', function () {
      var v = !T[key]; btn.setAttribute('data-on', v ? '1' : '0'); applyTweak(key, v);
    });
    return h('div', { class: 'twk-row twk-row-h' },
      h('div', { class: 'twk-lbl' }, h('span', {}, label)), btn);
  }
  function buildTweaksPanel(onClose) {
    var body = h('div', { class: 'twk-body' },
      twkSection('The gift'),
      twkNumber("This gift's number", 'giftNo', 1, 99),
      twkNumber('Out of (total)', 'giftTotal', 1, 99),
      twkText('Tag line', 'tagLine'),
      twkSection('The 3D gallery'),
      twkRadio('Photo effect', 'mode', ['tilt', 'ring', 'float']),
      twkSection('Words'),
      twkText('Their name', 'name'),
      twkText('Greeting', 'greeting'),
      twkText('Subtitle', 'subtitle'),
      twkSection('Mood'),
      twkColor('Gold accent', 'accent', ['#e8c879', '#f0b56a', '#d9a441', '#e6a8b0', '#cdb8e8']),
      twkToggle('Falling confetti', 'confettiRain'));
    var closeBtn = h('button', { class: 'twk-x', 'aria-label': 'Close tweaks' }, '✕');
    closeBtn.addEventListener('click', onClose);
    var panel = h('div', { class: 'twk-panel' },
      h('div', { class: 'twk-hd' }, h('b', {}, 'Tweaks'), closeBtn), body);
    return panel;
  }
  function buildTweaksUI() {
    var fab = h('button', { class: 'twk-fab', 'aria-label': 'Customize', title: 'Customize (press T)',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>' });
    document.body.appendChild(fab);
    var panel = null, open = false;
    function close() { open = false; if (panel) panel.style.display = 'none'; }
    function toggle() {
      open = !open;
      if (open) {
        if (!panel) { panel = buildTweaksPanel(close); document.body.appendChild(panel); }
        panel.style.display = 'flex';
      } else if (panel) panel.style.display = 'none';
    }
    fab.addEventListener('click', toggle);
    window.addEventListener('keydown', function (e) {
      var tag = e.target && e.target.tagName;
      if ((e.key === 't' || e.key === 'T') && !/INPUT|TEXTAREA|SELECT/.test(tag || '')) toggle();
      if (e.key === 'Escape' && open) close();
    });
  }

  /* ---------- Boot ---------- */
  function scheduleHeroConfetti() {
    setTimeout(function () {
      window.fireConfetti && window.fireConfetti({ count: 150, originY: 0.3, spread: 1.3 });
    }, 1200);
  }
  function begin() {
    refs.appStage.classList.add('started');
    try { sessionStorage.setItem('sharmila_opened', '1'); } catch (e) {}
    scheduleHeroConfetti();
  }
  function init() {
    document.documentElement.style.setProperty('--gold', T.accent);
    initAmbient();
    var root = document.getElementById('root');
    var appStage = h('div', { class: 'app-stage' }, Hero(), GalleryScene(), LetterScene(), CandleScene());
    refs.appStage = appStage;
    root.appendChild(appStage);

    var started = false;
    try { started = sessionStorage.getItem('sharmila_opened') === '1'; } catch (e) {}
    if (started) { appStage.classList.add('started'); scheduleHeroConfetti(); }
    else document.body.appendChild(mountGift(begin));

    setupReveal();
    if (T.confettiRain) toggleRain(true);
    buildTweaksUI();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
  </script>

  <!-- ============================ chunk 4 ============================ -->
  <!-- projector mode: scene navigation · fullscreen · idle-hide controls   -->
  <script>
  (function () {
    function scenes() {
      return Array.prototype.slice.call(document.querySelectorAll('.app-stage .scene'));
    }
    function gotoScene(dir) {
      var s = scenes();
      if (!s.length) return;
      var sy = window.scrollY, cur = 0, best = Infinity;
      s.forEach(function (el, i) {
        var d = Math.abs(el.offsetTop - sy);
        if (d < best) { best = d; cur = i; }
      });
      var t = Math.max(0, Math.min(s.length - 1, cur + dir));
      window.scrollTo({ top: s[t].offsetTop, behavior: 'smooth' });
    }
    function giftOverlay() { return document.querySelector('.gift-overlay'); }
    function navNext() {
      var g = giftOverlay();
      if (g) { // while the gift is on screen, "next" unwraps it (don't scroll behind it)
        if (!g.classList.contains('is-opening')) {
          var st = g.querySelector('.gift-stage'); if (st) st.click();
        }
        return;
      }
      gotoScene(1);
    }
    function navPrev() { if (giftOverlay()) return; gotoScene(-1); }

    function toggleFullscreen() {
      var d = document;
      var fsEl = d.fullscreenElement || d.webkitFullscreenElement;
      if (!fsEl) {
        var el = d.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) try { req.call(el); } catch (e) {}
      } else {
        var ex = d.exitFullscreen || d.webkitExitFullscreen;
        if (ex) try { ex.call(d); } catch (e) {}
      }
    }

    /* fullscreen button (bottom-left) */
    var fab = h('button', { class: 'proj-fab', 'aria-label': 'Fullscreen', title: 'Fullscreen (F)',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4"/><path d="M20 9V5a1 1 0 0 0-1-1h-4"/><path d="M4 15v4a1 1 0 0 0 1 1h4"/><path d="M20 15v4a1 1 0 0 1-1 1h-4"/></svg>' });
    fab.addEventListener('click', toggleFullscreen);
    document.body.appendChild(fab);

    /* keyboard + presentation clicker (clickers send arrows / Page Up-Down) */
    window.addEventListener('keydown', function (e) {
      var tag = (e.target && e.target.tagName) || '';
      if (/INPUT|TEXTAREA|SELECT/.test(tag)) return;
      switch (e.key) {
        case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ': case 'Spacebar':
          e.preventDefault(); navNext(); break;
        case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
          e.preventDefault(); navPrev(); break;
        case 'f': case 'F':
          e.preventDefault(); toggleFullscreen(); break;
        case 'Home':
          e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); break;
      }
    });

    /* idle: after 3s of no input, hide the cursor + the corner controls */
    var idleTimer;
    function resetIdle() {
      document.body.classList.remove('idle');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(function () { document.body.classList.add('idle'); }, 3000);
    }
    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'wheel'].forEach(function (ev) {
      window.addEventListener(ev, resetIdle, { passive: true });
    });
    resetIdle();

    console.log('%cProjector controls', 'color:#e8c879;font-weight:bold',
      '→ / Space / clicker = next · ← = back · F = fullscreen · T = tweaks');
  })();
  </script>
