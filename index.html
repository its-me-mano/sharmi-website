      '<path d="M' + (bx - 10) + ' ' + by + ' L' + HX + ' ' + (by - 44) + ' L' + (bx + bw + 10) + ' ' + by + ' Z" fill="#5a3f22" stroke="#1a1206" stroke-width="1.5"/>' +
      '<rect x="' + (bx + bw * 0.5 - 12) + '" y="' + (by + bh - 30) + '" width="24" height="30" rx="2" fill="#ffb74d"/>' +
      '<rect class="loc-win" x="' + (bx + 14) + '" y="' + (by + 14) + '" width="18" height="20" rx="2" fill="#ffd98a"/>' +
      '<rect class="loc-win" style="animation-delay:1.4s" x="' + (bx + bw - 32) + '" y="' + (by + 14) + '" width="18" height="20" rx="2" fill="#ffd98a"/>' +
      '<g class="loc-pin">' +
        '<circle class="loc-pinpulse" cx="' + HX + '" cy="' + (by - 78) + '" r="14" fill="none" stroke="#ffcf86" stroke-width="2"/>' +
        '<path d="M' + HX + ' ' + (by - 50) + ' C ' + (HX - 22) + ' ' + (by - 86) + ', ' + (HX - 22) + ' ' + (by - 122) + ', ' + HX + ' ' + (by - 122) + ' C ' + (HX + 22) + ' ' + (by - 122) + ', ' + (HX + 22) + ' ' + (by - 86) + ', ' + HX + ' ' + (by - 50) + ' Z" fill="#e9b86a" stroke="#7a5418" stroke-width="2"/>' +
        '<circle cx="' + HX + '" cy="' + (by - 96) + '" r="9" fill="#2a1c0a"/>' +
        '<circle cx="' + HX + '" cy="' + (by - 96) + '" r="4" fill="#ffe7b0"/>' +
      '</g>' +
    '</g>';
  }

  function mapSVG(){
    return '' +
    '<svg class="loc-map" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid slice" style="transform-origin:' + originPct.x.toFixed(2) + '% ' + originPct.y.toFixed(2) + '%" xmlns="http://www.w3.org/2000/svg">' +
      '<defs>' +
        '<radialGradient id="locHaze" cx="50%" cy="50%" r="50%">' +
          '<stop offset="0%" stop-color="#ffce86" stop-opacity=".55"/>' +
          '<stop offset="45%" stop-color="#ffb86b" stop-opacity=".22"/>' +
          '<stop offset="100%" stop-color="#ffb86b" stop-opacity="0"/>' +
        '</radialGradient>' +
        '<linearGradient id="locGround" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" stop-color="#0b1430"/>' +
          '<stop offset="100%" stop-color="#070d22"/>' +
        '</linearGradient>' +
      '</defs>' +
      '<rect x="0" y="0" width="1000" height="640" fill="url(#locGround)"/>' +
      '<g>' + stars() + '</g>' +
      '<g>' + streets() + '</g>' +
      '<g>' + houses() + '</g>' +
      '<g>' + trees() + '</g>' +
      hero() +
    '</svg>';
  }

  // defensive reads (per contract) so absent globals never throw
  var name = ((window.T && window.T.name) || 'Sharmila');
  void name; void (window.PHOTOS || []);

  var label = h('div', { class: 'loc-label' },
    h('div', { class: 'loc-kicker' }, 'our place'),
    h('div', { class: 'loc-line', 'html': 'we didn\'t make our memories in places — we are the <span class="loc-em">memories</span> of our life' }),
    h('div', { class: 'loc-rule' })
  );

  var stage = h('div', { class: 'loc-stage' },
    h('div', { class: 'loc-map-wrap', 'html': mapSVG() }),
    h('div', { class: 'loc-glow-veil' }),
    h('div', { class: 'loc-vig' }),
    label
  );

  var section = h('section', { class: 'scene loc-scene' }, stage);

  var inView = false;
  var timers = [];
  function clearTimers(){
    for (var i = 0; i < timers.length; i++){ clearTimeout(timers[i]); }
    timers = [];
  }

  function getMap(){ return stage.querySelector('.loc-map'); }

  function play(){
    var map = getMap();
    if (!map) return;
    map.classList.remove('loc-fly');
    stage.classList.remove('loc-active', 'loc-revealed');
    void map.offsetWidth;
    var revealDelay = prefersReduced() ? 350 : 1900;
    var start = function(){
      if (!inView) return;
      map.classList.add('loc-fly');
      stage.classList.add('loc-active');
      timers.push(setTimeout(function(){
        if (inView) stage.classList.add('loc-revealed');
      }, revealDelay));
    };
    if (typeof requestAnimationFrame === 'function'){
      requestAnimationFrame(start);
    } else {
      start();
    }
  }

  function reset(){
    clearTimers();
    var map = getMap();
    if (map) map.classList.remove('loc-fly');
    stage.classList.remove('loc-active', 'loc-revealed');
  }

  var io = null;
  if (typeof IntersectionObserver === 'function'){
    io = new IntersectionObserver(function(entries){
      for (var i = 0; i < entries.length; i++){
        var e = entries[i];
        if (e.target !== section) continue;
        var visible = e.isIntersecting && e.intersectionRatio >= 0.4;
        if (visible){
          if (!inView){ inView = true; play(); }
        } else {
          if (inView){ inView = false; reset(); }
        }
      }
    }, { threshold: [0, 0.4, 0.6] });
    io.observe(section);
  } else {
    // No IO support: show end state without crashing.
    inView = true;
    play();
  }

  function onTap(ev){
    if (!inView) return;
    try {
      if (ev && ev.target && ev.target.closest && ev.target.closest('.loc-label')) return;
      var fx = window.fireFireworks;
      if (typeof fx === 'function'){
        fx({ x: originPct.x / 100, y: 0.42, count: 34, power: 1 });
      }
    } catch (err) {}
  }
  stage.addEventListener('pointerdown', onTap);

  return section;
};
  })();
  </script>

  <!-- scene: Scene_doors -->
  <script>
  (function(){
window.Scene_doors = function Scene_doors(){
  var reduce = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  var inView = false;
  var sparkTimer = null;
  var openRaf = 0;
  var liveSparks = [];

  function recipientName(){ return ((window.T && window.T.name) || 'Sharmila'); }
  function monogram(){
    var n = recipientName().replace(/^\s+/, '');
    var c = n.charAt(0);
    return (c ? c.toUpperCase() : 'S');
  }

  function heartSVG(){
    return h('svg',{class:'door-heart',viewBox:'0 0 32 32','aria-hidden':'true'},
      h('path',{d:'M16 28C16 28 3 20 3 11.5C3 7 6.4 4 10 4C12.7 4 14.8 5.6 16 7.6C17.2 5.6 19.3 4 22 4C25.6 4 29 7 29 11.5C29 20 16 28 16 28Z',
        fill:'none',stroke:'var(--gold-bright)','stroke-width':'1.6',style:{filter:'drop-shadow(0 0 6px rgba(230,190,110,.6))'}}));
  }

  function leaf(side){
    var isL = side === 'l';
    return h('div',{class:'door-leaf door-leaf-'+(isL?'l':'r')},
      h('div',{class:'door-panel'},
        h('div',{class:'door-inlay'}),
        h('div',{class:'door-sheen'}),
        h('div',{class:'door-handle'}),
        isL ? h('div',{class:'door-mono',style:{left:'auto',right:'18%',transform:'none'}}, monogram()) : null,
        isL ? null : heartSVG()
      )
    );
  }

  // glints behind the doors
  var glintWrap = h('div',{class:'door-glints','aria-hidden':'true'});
  (function(){
    var pts = [[28,30],[64,24],[44,52],[74,60],[36,70],[56,38],[22,58]];
    for(var i=0;i<pts.length;i++){
      glintWrap.appendChild(h('div',{class:'door-glint',style:{left:pts[i][0]+'%',top:pts[i][1]+'%'}}));
    }
  })();

  var party = h('div',{class:'door-party','aria-hidden':'true'});
  var bloom = h('div',{class:'door-bloom','aria-hidden':'true'});
  var seam = h('div',{class:'door-seam','aria-hidden':'true'});
  var leafL = leaf('l');
  var leafR = leaf('r');

  var frame = h('div',{class:'door-frame'},
    h('div',{class:'door-interior'}, party, glintWrap, bloom),
    seam, leafL, leafR
  );

  var line = h('div',{class:'door-line','aria-live':'polite'},
    'Come in, ', h('span',{class:'door-nm'}, recipientName()), '…'
  );

  var stage = h('div',{class:'door-stage'}, frame, line);

  var section = h('section',{
    class:'scene door-scene',
    'data-screen-label':'Welcome',
    'data-screen':'Welcome'
  }, stage);

  function removeSpark(s){
    if(s && s.parentNode) s.parentNode.removeChild(s);
  }
  function clearSparks(){
    for(var i=0;i<liveSparks.length;i++){
      var sp = liveSparks[i];
      if(sp.raf) cancelAnimationFrame(sp.raf);
      removeSpark(sp.el);
    }
    liveSparks = [];
  }

  function emitSpark(){
    if(reduce || !inView) return;
    var el = h('div',{class:'door-spark'});
    var startX = 38 + Math.random()*24; // % across the frame
    el.style.left = startX + '%';
    frame.appendChild(el);
    var entry = { el: el, raf: 0 };
    liveSparks.push(entry);
    var rise = 120 + Math.random()*160;
    var drift = (Math.random()-0.5)*60;
    var dur = 1800 + Math.random()*1400;
    var t0 = performance.now();
    function done(){
      removeSpark(el);
      var idx = liveSparks.indexOf(entry);
      if(idx > -1) liveSparks.splice(idx,1);
    }
    function step(now){
      if(!inView){ done(); return; }
      var p = (now - t0)/dur;
      if(p>=1){ done(); return; }
      el.style.opacity = String(Math.sin(p*Math.PI));
      el.style.transform = 'translate('+(drift*p)+'px,'+(-rise*p)+'px) scale('+(0.6+0.8*(1-p))+')';
      entry.raf = requestAnimationFrame(step);
    }
    entry.raf = requestAnimationFrame(step);
  }

  function startSparks(){
    if(reduce) return;
    stopSparks();
    sparkTimer = setInterval(function(){
      if(!inView){ stopSparks(); return; }
      emitSpark(); emitSpark();
    }, 360);
  }
  function stopSparks(){
    if(sparkTimer){ clearInterval(sparkTimer); sparkTimer = null; }
  }

  function open(){
    frame.classList.add('door-open');
    party.classList.add('door-on');
    glintWrap.classList.add('door-on');
    bloom.classList.add('door-on');
    line.classList.add('door-on');
    startSparks();
  }
  function close(){
    if(openRaf){ cancelAnimationFrame(openRaf); openRaf = 0; }
    frame.classList.remove('door-open');
    party.classList.remove('door-on');
    glintWrap.classList.remove('door-on');
    bloom.classList.remove('door-on');
    line.classList.remove('door-on');
    stopSparks();
    clearSparks();
  }

  // tap anywhere (while in view) to fire fireworks
  function onTap(e){
    if(!inView) return;
    try{
      if(e && e.target && e.target.closest && e.target.closest('image-slot')) return;
      var w = window.innerWidth || 1, hgt = window.innerHeight || 1;
      var x = (e && e.clientX != null ? e.clientX : w/2) / w;
      var y = (e && e.clientY != null ? e.clientY : hgt/2) / hgt;
      if(typeof window.fireFireworks === 'function') window.fireFireworks({x:x,y:y});
    }catch(err){}
  }
  document.addEventListener('pointerdown', onTap);

  var io = new IntersectionObserver(function(entries){
    for(var i=0;i<entries.length;i++){
      var en = entries[i];
      if(en.isIntersecting && en.intersectionRatio >= 0.4){
        if(!inView){
          inView = true;
          // ensure a clean closed state, then open on the next frame so the transition runs
          frame.classList.remove('door-open');
          party.classList.remove('door-on');
          glintWrap.classList.remove('door-on');
          bloom.classList.remove('door-on');
          line.classList.remove('door-on');
          if(reduce){
            open();
          } else {
            if(openRaf) cancelAnimationFrame(openRaf);
            openRaf = requestAnimationFrame(function(){
              openRaf = requestAnimationFrame(function(){
                openRaf = 0;
                if(inView) open();
              });
            });
          }
        }
      } else if(inView){
        inView = false;
        close();
      }
    }
  }, {threshold:[0,0.4,0.6]});
  io.observe(section);

  return section;
};
  })();
  </script>

  <!-- scene: Scene_room -->
  <script>
  (function(){
window.Scene_room = function Scene_room(){
  var NAME = ((window.T && window.T.name) || 'Sharmila');
  var PHOTOS = (window.PHOTOS || []);
  var BCOLORS = [
    ['#e9c878','#b98e3a'], // gold
    ['#e79bb0','#c45f7c'], // rose
    ['#f1c0c8','#dc94a4'], // blush
    ['#9fc0e8','#6b8fc4'], // soft blue
    ['#c79bd1','#8f5fa3'], // plum
    ['#f0d28a','#cba24e'], // warm gold
    ['#e8a6b6','#cf7a92'], // pink
    ['#aeb8e6','#7d88c8']  // periwinkle
  ];

  var SVGNS = 'http://www.w3.org/2000/svg';
  var BALLOON_COUNT = 12;

  var section, inView = false;
  var balloonLayer, balloons = [];
  var lightbox = null, lbImg = null, lbCap = null;
  var io = null;
  var BALLOON_SLOTS = [];

  function rnd(a,b){ return a + Math.random()*(b-a); }

  function prefersReduced(){
    return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  }

  // ---------- Bunting ----------
  function buildBunting(){
    var letters = ['H','A','P','P','Y',' ','B','I','R','T','H','D','A','Y'];
    var palette = ['#d8a878','#e79bb0','#9fc0e8','#c79bd1','#e9c878','#f1c0c8'];
    var n = letters.length, vbW = 1000, step = vbW/(n+1);
    var svg = document.createElementNS(SVGNS,'svg');
    svg.setAttribute('viewBox','0 0 '+vbW+' 84');
    svg.setAttribute('preserveAspectRatio','none');
    var path = document.createElementNS(SVGNS,'path');
    var d='M0,8 ';
    for(var i=1;i<=n;i++){ var cx=i*step; d+='Q '+(cx-step/2)+',26 '+cx+',8 '; }
    path.setAttribute('d',d);
    path.setAttribute('stroke','rgba(212,175,120,.7)');
    path.setAttribute('stroke-width','2.4'); path.setAttribute('fill','none');
    svg.appendChild(path);
    for(var k=0;k<n;k++){
      if(letters[k]===' ') continue;
      var x=(k+1)*step;
      var g=document.createElementNS(SVGNS,'g');
      g.setAttribute('class','room-flag');
      g.style.animationDelay = (0.25 + k*0.06)+'s, '+(0.9 + k*0.18)+'s';
      var col = palette[k%palette.length];
      var tri=document.createElementNS(SVGNS,'path');
      tri.setAttribute('d','M'+(x-19)+',12 L'+(x+19)+',12 L'+x+',62 Z');
      tri.setAttribute('fill',col);
      tri.setAttribute('stroke','rgba(0,0,0,.12)'); tri.setAttribute('stroke-width','1');
      var t=document.createElementNS(SVGNS,'text');
      t.setAttribute('x',x); t.setAttribute('y',38);
      t.setAttribute('text-anchor','middle');
      t.textContent=letters[k];
      g.appendChild(tri); g.appendChild(t);
      svg.appendChild(g);
    }
    return h('div',{class:'room-bunting'}, svg);
  }

  // ---------- Garland ----------
  function captionFor(id, fallback){
    var arr = (window.PHOTOS || PHOTOS || []);
    for(var p=0;p<arr.length;p++){
      if(arr[p] && arr[p].id===id && arr[p].caption){ return arr[p].caption; }
    }
    return fallback;
  }

  function buildGarland(){
    var wireSvg=document.createElementNS(SVGNS,'svg');
    wireSvg.setAttribute('viewBox','0 0 1000 46');
    wireSvg.setAttribute('preserveAspectRatio','none');
    var wp=document.createElementNS(SVGNS,'path');
    wp.setAttribute('d','M0,6 Q500,46 1000,6');
    wp.setAttribute('stroke','rgba(245,230,200,.45)');
    wp.setAttribute('stroke-width','2'); wp.setAttribute('fill','none');
    wireSvg.appendChild(wp);
    var wire = h('div',{class:'room-wire'}, wireSvg);

    var cards=[];
    var rots=[-5,3,-3,5,-4,2];
    var caps=['us','always','my favorite','golden hours','you & me','forever'];
    for(var i=0;i<6;i++){
      var id='ph-'+(i+1);
      var caption=captionFor(id, caps[i]);
      var rot=rots[i%rots.length];
      var slot = h('image-slot',{id:id, shape:'rounded', radius:'6', placeholder:'Drop a photo',
        style:{width:'100%',height:'100%',display:'block'}});
      var frame = h('div',{class:'room-card-frame'}, slot);
      var card = h('div',{
        class:'room-card',
        'data-id':id,
        'data-caption':caption,
        style:{'--rot':rot+'deg','--sway':(1.4+(i%3)*0.5)+'deg',
               animationDelay:(0.5+i*0.1)+'s, '+(1.2+i*0.25)+'s'},
        onClick:(function(sid,scap){ return function(){ if(!inView) return; openLightbox(sid,scap); }; })(id,caption)
      },
        h('span',{class:'room-pin',style:{'--protate':(rot* -0.6)+'deg'}}),
        frame,
        h('div',{class:'room-cap'}, caption)
      );
      cards.push(card);
    }
    return h('div',{class:'room-garland'}, wire, h('div',{class:'room-cards'}, cards));
  }

  // ---------- Balloons ----------
  function makeStringSvg(){
    var s=document.createElementNS(SVGNS,'svg');
    s.setAttribute('class','room-balloon-string');
    s.setAttribute('viewBox','0 0 30 60');
    var p=document.createElementNS(SVGNS,'path');
    p.setAttribute('d','M15,0 C8,14 22,28 15,42 C10,52 16,56 15,60');
    s.appendChild(p);
    return s;
  }

  function defineBalloonSlots(){
    BALLOON_SLOTS = [];
    for(var i=0;i<BALLOON_COUNT;i++){
      var leftBase = 5 + (i*7.8)%90;
      BALLOON_SLOTS.push({
        left: Math.max(2, Math.min(92, leftBase + rnd(-3,3))),
        top: rnd(40,82),
        size: Math.round(rnd(48,72)),
        drift: (i%5===0),
        bobDur: rnd(3.4,5.2).toFixed(2),
        bobDelay: rnd(0,2).toFixed(2),
        riseDur: rnd(14,22).toFixed(1)
      });
    }
  }

  function spawnBalloon(slotIndex){
    if(!balloonLayer || !BALLOON_SLOTS[slotIndex]) return null;
    var spec = BALLOON_SLOTS[slotIndex];
    var col = BCOLORS[slotIndex % BCOLORS.length];
    var body = h('div',{class:'room-balloon-body',style:{'--c1':col[0],'--c2':col[1]}});
    var bob = h('div',{class:'room-balloon-bob'}, body, makeStringSvg());
    var size = spec.size;
    var el = h('div',{
      class:'room-balloon'+(spec.drift?' room-drift':''),
      style:{
        left:spec.left+'%', top:spec.top+'%',
        '--bw':size+'px','--bh':(size*1.25)+'px',
        animationDelay:(0.4+slotIndex*0.08)+'s'
      },
      onPointerDown:function(ev){ if(!inView) return; if(ev && ev.preventDefault) ev.preventDefault(); popBalloon(el, slotIndex); }
    }, bob);
    bob.style.animationDuration = spec.bobDur+'s'+(spec.drift?(', '+spec.riseDur+'s'):'');
    bob.style.animationDelay = spec.bobDelay+'s'+(spec.drift?(', '+spec.bobDelay+'s'):'');
    balloonLayer.appendChild(el);
    balloons[slotIndex]=el;
    return el;
  }

  function clearBalloons(){
    for(var i=0;i<balloons.length;i++){
      var el = balloons[i];
      if(el && el.parentNode) el.parentNode.removeChild(el);
      balloons[i]=null;
    }
    balloons = [];
  }

  function spawnAllBalloons(){
    clearBalloons();
    for(var i=0;i<BALLOON_COUNT;i++){ spawnBalloon(i); }
  }

  function popBalloon(el, slotIndex){
    if(!el || el.classList.contains('room-pop')) return;
    var r = el.getBoundingClientRect();
    var cx = r.left + r.width/2, cy = r.top + r.height*0.4;
    burstHearts(cx, cy);
    el.classList.add('room-pop');
    setTimeout(function(){
      if(el && el.parentNode) el.parentNode.removeChild(el);
      if(balloons[slotIndex]===el) balloons[slotIndex]=null;
      if(inView){ spawnBalloon(slotIndex); }
    }, 320);
  }

  function burstHearts(cx, cy){
    var n = 7;
    for(var i=0;i<n;i++){
      var dx = rnd(-46,46);
      var rise = rnd(70,150);
      var hh = h('div',{class:'room-heart',style:{
        left:cx+'px', top:cy+'px',
        '--dx':dx+'px','--rise':rise+'px','--dur':rnd(900,1500)+'ms',
        fontSize:rnd(13,24)+'px',
        animationDelay:(i*0.03)+'s'
      }}, '♥');
      document.body.appendChild(hh);
      (function(node){ setTimeout(function(){ if(node.parentNode) node.parentNode.removeChild(node); }, 1700); })(hh);
    }
  }

  // ---------- Lightbox ----------
  function buildLightbox(){
    lbImg = h('div',{class:'room-lb-img'});
    lbCap = h('div',{class:'room-lb-cap'});
    var card = h('div',{class:'room-lb-card'},
      lbImg, lbCap,
      h('div',{class:'room-lb-hint'}, 'click anywhere to close')
    );
    lightbox = h('div',{class:'room-lightbox', onClick:closeLightbox}, card);
    return lightbox;
  }

  function lightboxOpen(){
    return !!(lightbox && lightbox.classList.contains('room-show'));
  }

  function openLightbox(id, caption){
    if(!lightbox || !lbImg || !lbCap) return;
    var src = null;
    try{
      var slot = section.querySelector('image-slot[id="'+id+'"]');
      if(slot){
        var img = slot.querySelector('img');
        if(img && img.src) src = img.src;
        if(!src){
          try{
            var stored = localStorage.getItem('image-slot:'+id) || localStorage.getItem(id);
            if(stored && stored.indexOf('data:')===0) src=stored;
          }catch(e){}
        }
      }
    }catch(e){}
    lbImg.innerHTML = '';
    if(src){
      lbImg.appendChild(h('img',{src:src, alt:caption||''}));
    }else{
      lbImg.appendChild(h('div',{style:{width:'100%',height:'100%',display:'flex',alignItems:'center',
        justifyContent:'center',color:'var(--muted)',fontFamily:'var(--sans)',fontSize:'14px',
        letterSpacing:'.1em',textAlign:'center',padding:'20px'}}, 'Drop a photo on this card first'));
    }
    lbCap.textContent = caption || '';
    lightbox.style.display='flex';
    void lightbox.offsetWidth; // force reflow then show
    lightbox.classList.add('room-show');
  }

  function closeLightbox(){
    if(!lightbox) return;

      });
      var t = Math.max(0, Math.min(s.length - 1, cur + dir));
      window.scrollTo({ top: s[t].offsetTop, behavior: 'smooth' });
    }
    function giftOverlay() { return document.querySelector('.gift-overlay'); }
    function navNext() {
      var g = giftOverlay();
      if (g) { // while the gift is on screen, "next" unwraps it (don't scroll behind it)
        if (!g.classList.contains('is-opening')) {
          var st = g.querySelector('.gift-stage'); if (st) st.click();
        }
        return;
      }
      gotoScene(1);
    }
    function navPrev() { if (giftOverlay()) return; gotoScene(-1); }

    function toggleFullscreen() {
      var d = document;
      var fsEl = d.fullscreenElement || d.webkitFullscreenElement;
      if (!fsEl) {
        var el = d.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) try { req.call(el); } catch (e) {}
      } else {
        var ex = d.exitFullscreen || d.webkitExitFullscreen;
        if (ex) try { ex.call(d); } catch (e) {}
      }
    }

    /* fullscreen button (bottom-left) */
    var fab = h('button', { class: 'proj-fab', 'aria-label': 'Fullscreen', title: 'Fullscreen (F)',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4"/><path d="M20 9V5a1 1 0 0 0-1-1h-4"/><path d="M4 15v4a1 1 0 0 0 1 1h4"/><path d="M20 15v4a1 1 0 0 1-1 1h-4"/></svg>' });
    fab.addEventListener('click', toggleFullscreen);
    document.body.appendChild(fab);

    /* keyboard + presentation clicker (clickers send arrows / Page Up-Down) */
    window.addEventListener('keydown', function (e) {
      var tag = (e.target && e.target.tagName) || '';
      if (/INPUT|TEXTAREA|SELECT/.test(tag)) return;
      switch (e.key) {
        case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ': case 'Spacebar':
          e.preventDefault(); navNext(); break;
        case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
          e.preventDefault(); navPrev(); break;
        case 'f': case 'F':
          e.preventDefault(); toggleFullscreen(); break;
        case 'Home':
          e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); break;
      }
    });

    /* idle: after 3s of no input, hide the cursor + the corner controls */
    var idleTimer;
    function resetIdle() {
      document.body.classList.remove('idle');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(function () { document.body.classList.add('idle'); }, 3000);
    }
    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'wheel'].forEach(function (ev) {
      window.addEventListener(ev, resetIdle, { passive: true });
    });
    resetIdle();

    console.log('%cProjector controls', 'color:#e8c879;font-weight:bold',
      '→ / Space / clicker = next · ← = back · F = fullscreen · T = tweaks');
  })();
  </script>
</body>
</html>
