<style>
  :root {
    /* deep & moody — navy / black / gold */
    --bg-0: oklch(0.13 0.025 270);
    --bg-1: oklch(0.09 0.02 270);
    --bg-2: oklch(0.16 0.03 280);
    --ink:  oklch(0.95 0.012 90);
    --muted: oklch(0.74 0.02 280);
    --gold: oklch(0.83 0.105 86);
    --gold-bright: oklch(0.90 0.11 90);
    --gold-deep: oklch(0.68 0.10 78);
    --rose: oklch(0.80 0.07 20);
    --line: oklch(0.83 0.105 86 / 0.22);

    --serif: "Cormorant Garamond", Georgia, serif;
    --script: "Great Vibes", cursive;
    --sans: "Outfit", system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-1);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  body { scroll-behavior: smooth; }

  #ambient-canvas, #fireworks-canvas, #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
  }
  #fireworks-canvas { z-index: 58; }
  #confetti-canvas { z-index: 60; }

  #root { position: relative; z-index: 1; }

  .scene {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(28px, 6vw, 90px) clamp(20px, 5vw, 80px);
    overflow: hidden;
  }

  /* vignette + grain via background layers */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% -10%, oklch(0.22 0.04 280 / 0.7), transparent 60%),
      radial-gradient(100% 90% at 50% 120%, oklch(0.18 0.05 300 / 0.55), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0) 55%, var(--bg-1));
  }

  .eyebrow {
    font-family: var(--sans);
    font-weight: 400;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    font-size: clamp(10px, 1.1vw, 13px);
    color: var(--gold);
    opacity: 0.85;
  }

  .scroll-cue {
    position: absolute;
    bottom: clamp(20px, 4vh, 42px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: floaty 2.4s ease-in-out infinite;
  }
  .scroll-cue .dot {
    width: 22px; height: 34px;
    border: 1px solid var(--line);
    border-radius: 12px;
    position: relative;
  }
  .scroll-cue .dot::after {
    content: "";
    position: absolute;
    top: 7px; left: 50%;
    width: 3px; height: 7px;
    margin-left: -1.5px;
    border-radius: 2px;
    background: var(--gold);
    animation: wheel 1.8s ease-in-out infinite;
  }
  @keyframes wheel { 0%{opacity:0;transform:translateY(0)} 40%{opacity:1} 100%{opacity:0;transform:translateY(12px)} }
  @keyframes floaty { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* image-slot theming */
  image-slot {
    --is-bg: oklch(0.2 0.03 280);
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.8), 0 0 0 1px var(--line) inset;
  }

  ::selection { background: var(--gold); color: var(--bg-0); }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.2s !important; }
  }

  /* ===================================================================== */
  /* components.css — gallery, candle, scenes, intro                       */
  /* ===================================================================== */

  /* ===== Photo frames ===== */
  .photo-frame { display: flex; flex-direction: column; gap: 12px; }
  .photo-mat {
    position: relative;
    padding: 7px;
    background: linear-gradient(160deg, oklch(0.86 0.10 88), oklch(0.62 0.09 70) 55%, oklch(0.8 0.1 86));
    border-radius: 16px;
    box-shadow: 0 34px 70px -30px rgba(0,0,0,0.85), 0 2px 0 oklch(0.95 0.06 90 / 0.5) inset;
  }
  .photo-mat image-slot { border-radius: 10px; overflow: hidden; }
  .photo-gloss {
    position: absolute; inset: 7px;
    border-radius: 10px;
    pointer-events: none;
    background: radial-gradient(120% 80% at var(--gx,30%) var(--gy,20%), oklch(1 0 0 / 0.16), transparent 45%);
    mix-blend-mode: screen;
  }
  .photo-cap { display: flex; flex-direction: column; gap: 3px; text-align: center; }
  .cap-date {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.34em;
    text-transform: uppercase; color: var(--gold); opacity: 0.85;
  }
  .cap-text { font-family: var(--serif); font-style: italic; font-size: clamp(15px, 1.7vw, 20px); color: var(--ink); }

  /* floating bob */
  .float-anim { animation: bob 6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-14px) } }

  /* ===== TILT grid ===== */
  .tilt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: clamp(22px, 3vw, 44px);
    width: min(1180px, 100%);
    perspective: 1200px;
  }
  .tilt-card { transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(.2,.8,.2,1); will-change: transform; cursor: pointer; }

  /* ===== RING carousel ===== */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; }
  .ring-stage {
    position: relative;
    width: min(680px, 92vw);
    height: clamp(300px, 42vh, 460px);
    perspective: 1300px;
    cursor: grab;
    touch-action: pan-y;
  }
  .ring-stage:active { cursor: grabbing; }
  .ring {
    position: absolute; inset: 0; margin: auto;
    width: clamp(180px, 24vw, 300px); height: clamp(230px, 30vw, 380px);
    left: 0; right: 0; top: 0; bottom: 0;
    transform-style: preserve-3d;
  }
  .ring-item {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    backface-visibility: hidden;
  }
  .ring-controls { display: flex; align-items: center; gap: 22px; }
  .ring-btn {
    width: 50px; height: 50px; border-radius: 50%;
    background: oklch(0.2 0.03 280 / 0.6);
    border: 1px solid var(--line);
    color: var(--gold); font-size: 26px; line-height: 1; cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.2s, transform 0.2s;
  }
  .ring-btn:hover { background: oklch(0.26 0.04 280 / 0.8); transform: translateY(-2px); }
  .ring-btn:active { transform: scale(0.94); }
  .ring-cap { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: clamp(180px, 40vw, 320px); text-align: center; }
  .ring-hint { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); opacity: 0.7; }

  /* ===== FLOAT depth field ===== */
  .float-stage {
    position: relative;
    width: min(1100px, 100%);
    height: clamp(440px, 64vh, 640px);
    perspective: 1100px;
  }
  .float-item {
    position: absolute;
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
    will-change: transform;
  }

  /* ===== Scene headings ===== */
  .section-head { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; margin-bottom: clamp(34px, 5vw, 62px); }
  .kicker {
    font-family: var(--sans); font-weight: 400; letter-spacing: 0.42em; text-transform: uppercase;
    font-size: clamp(10px, 1.1vw, 13px); color: var(--gold); opacity: 0.85;
  }
  .title { font-family: var(--serif); font-weight: 500; font-size: clamp(34px, 6vw, 76px); line-height: 1.02; letter-spacing: -0.01em; }
  .title em { font-style: italic; color: var(--gold); }
  .lead { font-family: var(--serif); font-style: italic; font-size: clamp(17px, 2.2vw, 24px); color: var(--muted); max-width: 46ch; text-wrap: pretty; }

  .divider { display: flex; align-items: center; gap: 14px; color: var(--gold); opacity: 0.8; }
  .divider::before, .divider::after { content: ""; height: 1px; width: clamp(40px, 8vw, 90px); background: linear-gradient(90deg, transparent, var(--line)); }
  .divider span { font-size: 13px; }

  /* ===== HERO / intro ===== */
  .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 2.4vw, 26px); }
  /* entrance gated on .started — plays only after the gift is unwrapped */
  .hero-kicker { opacity: 0; }
  .app-stage .hero-kicker { opacity: 0; }
  .app-stage.started .hero-kicker { animation: fadeUp 1s ease 0.2s forwards; }
  .hero-hb {
    font-family: var(--script);
    font-size: clamp(58px, 13vw, 168px);
    line-height: 0.9;
    color: var(--gold);
    filter: drop-shadow(0 8px 30px oklch(0.83 0.105 86 / 0.35));
  }
  .hero-hb .ltr { display: inline-block; opacity: 0; transform: translateY(40px) rotate(8deg); }
  .started .hero-hb .ltr { animation: dropIn 0.8s cubic-bezier(.2,.8,.25,1) forwards; }
  .hero-name {
    font-family: var(--serif); font-weight: 600;
    font-size: clamp(40px, 9vw, 120px); letter-spacing: 0.02em; line-height: 1;
    opacity: 0;
    color: oklch(0.94 0.02 90);
    text-shadow: 0 2px 24px oklch(0.83 0.105 86 / 0.25);
  }
  .started .hero-name { animation: fadeUp 1.1s ease 1.1s forwards; }
  .hero-rule { width: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .started .hero-rule { animation: ruleGrow 1.4s ease 1.5s forwards; }
  .hero-sub { font-family: var(--serif); font-style: italic; font-size: clamp(16px, 2.4vw, 26px); color: var(--muted); opacity: 0; max-width: 40ch; text-wrap: pretty; }
  .started .hero-sub { animation: fadeUp 1.1s ease 1.8s forwards; }

  @keyframes dropIn { to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(26px);} to { opacity: 1; transform: none; } }
  @keyframes ruleGrow { to { width: min(360px, 70vw); } }

  /* ===== Letter / message ===== */
  .letter {
    width: min(760px, 100%);
    background: linear-gradient(170deg, oklch(0.18 0.03 280 / 0.7), oklch(0.13 0.025 275 / 0.7));
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: clamp(34px, 5vw, 70px);
    box-shadow: 0 50px 90px -50px rgba(0,0,0,0.9);
    backdrop-filter: blur(6px);
  }
  .letter-body { font-family: var(--serif); font-size: clamp(19px, 2.5vw, 28px); line-height: 1.6; color: var(--ink); text-wrap: pretty; }
  .letter-body p { margin-bottom: 1em; }
  .letter-body .drop { font-family: var(--script); font-size: 1.7em; color: var(--gold); line-height: 0; }
  .signed { font-family: var(--script); font-size: clamp(30px, 4vw, 48px); color: var(--gold); margin-top: 0.3em; }

  /* ===== Candle / cake ===== */
  .candle-scene { display: flex; flex-direction: column; align-items: center; gap: clamp(26px, 4vw, 44px); }
  .cake-wrap { position: relative; width: 280px; height: 250px; display: flex; align-items: flex-end; justify-content: center; }

  .cake { position: relative; width: 240px; display: flex; flex-direction: column; align-items: center; }
  .tier { position: relative; border-radius: 14px 14px 8px 8px; box-shadow: 0 18px 40px -18px rgba(0,0,0,0.8) inset, 0 -3px 0 oklch(1 0 0 / 0.05) inset; }
  .tier-top { width: 150px; height: 64px; background: linear-gradient(180deg, oklch(0.32 0.06 350), oklch(0.26 0.05 350)); z-index: 2; }
  .tier-bot { width: 220px; height: 80px; margin-top: -6px; background: linear-gradient(180deg, oklch(0.3 0.055 345), oklch(0.23 0.045 345)); z-index: 1; }
  .drip { position: absolute; left: 0; right: 0; top: -2px; height: 22px;
    background:
      radial-gradient(10px 14px at 12% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(12px 18px at 34% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(10px 13px at 56% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(13px 19px at 78% 0, oklch(0.86 0.1 88) 60%, transparent 62%),
      radial-gradient(10px 14px at 95% 0, oklch(0.86 0.1 88) 60%, transparent 62%);
    border-radius: 14px 14px 0 0;
  }
  .tier-top .drip { background-color: transparent; }
  .sprinkles, .dots { position: absolute; inset: 0; }
  .sprinkles { background-image:
    radial-gradient(2px 2px at 30% 60%, var(--gold) 50%, transparent 52%),
    radial-gradient(2px 2px at 60% 70%, oklch(0.85 0.07 20) 50%, transparent 52%),
    radial-gradient(2px 2px at 78% 50%, var(--gold) 50%, transparent 52%),
    radial-gradient(2px 2px at 45% 80%, oklch(0.8 0.06 280) 50%, transparent 52%); }
  .dots { background-image: radial-gradient(3px 3px at 50% 50%, var(--gold) 50%, transparent 52%); background-size: 40px 40px; opacity: 0.5; }
  .plate { width: 250px; height: 14px; margin-top: -2px; border-radius: 50%; background: linear-gradient(180deg, oklch(0.6 0.02 280), oklch(0.3 0.02 280)); box-shadow: 0 24px 40px -18px rgba(0,0,0,0.9); }

  .candle-stick { position: absolute; left: 50%; top: 30px; transform: translateX(-50%); width: 14px; height: 70px; z-index: 3;
    background: repeating-linear-gradient(45deg, oklch(0.92 0.04 30) 0 6px, oklch(0.78 0.08 25) 6px 12px);
    border-radius: 4px; cursor: pointer; box-shadow: 0 6px 14px -6px rgba(0,0,0,0.7); }
  .wick { position: absolute; left: 50%; top: -8px; transform: translateX(-50%); width: 2px; height: 9px; background: oklch(0.2 0 0); border-radius: 2px; }

  .flame-col { position: absolute; left: 50%; top: 22px; transform: translateX(-50%); z-index: 4; transition: opacity 0.4s; }
  .flame { position: absolute; left: 50%; bottom: 0; transform-origin: bottom center; width: 18px; height: 34px;
    margin-left: -9px;
    transition: transform 0.12s ease; animation: flicker 0.18s ease-in-out infinite alternate; }
  .flame-inner {
    width: 100%; height: 100%;
    background: radial-gradient(60% 60% at 50% 75%, #fff6cf 0%, var(--gold-bright) 35%, oklch(0.7 0.18 50) 75%, oklch(0.55 0.2 35) 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform: scaleX(0.8);
    box-shadow: 0 0 16px 4px oklch(0.85 0.12 70 / 0.7);
  }
  .flame-glow { position: absolute; left: 50%; bottom: -14px; transform: translateX(-50%); width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle, oklch(0.85 0.12 75 / 0.28), transparent 65%); pointer-events: none; animation: glowPulse 2.4s ease-in-out infinite; }
  @keyframes flicker { from { transform: scaleY(0.96) scaleX(1.02);} to { transform: scaleY(1.04) scaleX(0.98);} }
  @keyframes glowPulse { 0%,100%{ opacity: 0.8; transform: translateX(-50%) scale(1);} 50%{ opacity: 1; transform: translateX(-50%) scale(1.12);} }
  .smoke { position: absolute; left: 50%; top: 14px; transform: translateX(-50%); width: 6px; height: 40px; z-index: 4;
    background: linear-gradient(180deg, oklch(0.8 0 0 / 0.4), transparent); border-radius: 50%;
    animation: smoke 1.6s ease-out forwards; filter: blur(2px); }
  @keyframes smoke { 0%{ opacity: 0.6; transform: translateX(-50%) translateY(0) scaleX(1);} 100%{ opacity: 0; transform: translateX(-50%) translateY(-46px) scaleX(2.4);} }

  /* wish UI */
  .wish-ui { display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; }
  .wish-line { font-family: var(--serif); font-style: italic; font-size: clamp(19px, 2.6vw, 28px); color: var(--ink); line-height: 1.4; }
  .wish-line span { color: var(--gold); }
  .wish-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .wish-done { font-family: var(--script); font-size: clamp(34px, 5vw, 56px); color: var(--gold); }
  .btn-ghost {
    font-family: var(--sans); font-size: 14px; letter-spacing: 0.04em;
    padding: 13px 26px; border-radius: 100px; cursor: pointer;
    background: oklch(0.2 0.03 280 / 0.5); color: var(--ink);
    border: 1px solid var(--line); transition: all 0.2s;
  }
  .btn-ghost:hover { background: oklch(0.83 0.105 86 / 0.14); border-color: var(--gold); }
  .btn-link { background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; text-decoration-color: var(--line); }
  .btn-link:hover { color: var(--gold); }
  .mic-live { display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: var(--sans); font-size: 13px; letter-spacing: 0.1em; color: var(--gold); }
  .mic-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rose); box-shadow: 0 0 0 0 oklch(0.8 0.07 20 / 0.6); animation: pulse 1.3s infinite; display: inline-block; }
  @keyframes pulse { 0%{ box-shadow: 0 0 0 0 oklch(0.8 0.07 20 / 0.5);} 70%{ box-shadow: 0 0 0 10px oklch(0.8 0.07 20 / 0);} 100%{ box-shadow: 0 0 0 0 oklch(0.8 0.07 20 / 0);} }
  .mic-meter { width: 180px; height: 6px; border-radius: 4px; background: oklch(0.25 0.02 280); overflow: hidden; }
  .mic-meter i { display: block; height: 100%; background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright)); transition: width 0.08s; }

  /* footer mark */
  .footer-mark { text-align: center; display: flex; flex-direction: column; gap: 8px; align-items: center; padding-top: 20px; }
  .footer-mark .fm-h { font-family: var(--script); font-size: clamp(30px, 4vw, 48px); color: var(--gold); }
  .footer-mark .fm-s { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

  /* ===== Gift unwrap overlay ===== */
  .gift-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 90% at 50% 42%, oklch(0.17 0.03 280 / 0.55), oklch(0.09 0.02 270 / 0.92) 70%),
      oklch(0.09 0.02 270 / 0.86);
    backdrop-filter: blur(2px);
    transition: opacity 0.8s ease 0.85s;
    opacity: 1;
  }
  .gift-overlay.is-opening { opacity: 0; pointer-events: none; }

  .gift-stage {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(40px, 8vh, 80px);
    cursor: pointer;
    padding-top: 70px;
    perspective: 1000px;
  }

  .gift-burst {
    position: absolute; left: 50%; top: 42%; transform: translate(-50%, -50%) scale(0.2);
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, oklch(0.95 0.08 90 / 0.9), oklch(0.85 0.12 80 / 0.4) 35%, transparent 68%);
    opacity: 0; pointer-events: none;
  }
  .is-opening .gift-burst { animation: giftBurst 1.1s ease-out forwards; }
  @keyframes giftBurst {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.2); }
    35% { opacity: 1; transform: translate(-50%,-50%) scale(1.4); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(3.4); }
  }

  .gift-box {
    position: relative;
    width: clamp(170px, 44vw, 230px);
    animation: bob 4.5s ease-in-out infinite;
    transform-style: preserve-3d;
  }
  .is-opening .gift-box { animation: none; }

  /* body */
  .gift-body {
    position: relative;
    width: 100%; height: clamp(120px, 30vw, 158px);
    border-radius: 6px 6px 9px 9px;
    background:
      repeating-linear-gradient(135deg, oklch(0.27 0.055 285) 0 14px, oklch(0.23 0.05 285) 14px 28px);
    box-shadow: 0 40px 70px -34px rgba(0,0,0,0.9), 0 -4px 0 oklch(1 0 0 / 0.04) inset;
    transition: transform 0.9s cubic-bezier(.3,.6,.3,1), opacity 0.8s ease 0.5s;
  }
  .is-opening .gift-body { transform: translateY(34px) scale(0.94); opacity: 0; }
  .body-ribbon {
    position: absolute; top: 0; bottom: 0; left: 50%; width: 30px; transform: translateX(-50%);
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright) 45%, var(--gold-deep));
    box-shadow: 0 0 14px oklch(0.85 0.1 80 / 0.3);
  }
  .body-sheen {
    position: absolute; inset: 0; border-radius: 6px 6px 9px 9px; pointer-events: none;
    background: linear-gradient(110deg, transparent 30%, oklch(1 0 0 / 0.10) 48%, transparent 60%);
  }

  /* lid */
  .gift-lid {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    width: 114%; height: clamp(30px, 7vw, 40px);
    border-radius: 8px 8px 4px 4px;
    background: linear-gradient(180deg, oklch(0.31 0.06 288), oklch(0.24 0.05 286));
    box-shadow: 0 16px 30px -16px rgba(0,0,0,0.8), 0 -3px 0 oklch(1 0 0 / 0.06) inset;
    transition: transform 1s cubic-bezier(.3,.5,.2,1), opacity 0.7s ease 0.45s;
    z-index: 3;
  }
  .is-opening .gift-lid { transform: translateX(-50%) translateY(-220px) rotate(-16deg); opacity: 0; }
  .lid-ribbon {
    position: absolute; top: 0; bottom: 0; left: 50%; width: 30px; transform: translateX(-50%);
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright) 45%, var(--gold-deep));
  }

  /* bow */
  .gift-bow {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 30px; z-index: 4;
  }
  .bow-loop {
    position: absolute; top: 2px; width: 34px; height: 26px;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold-deep));
    box-shadow: 0 2px 6px rgba(0,0,0,0.35) inset, 0 3px 8px -4px rgba(0,0,0,0.6);
  }
  .bow-l { left: 2px; border-radius: 60% 30% 50% 60% / 70% 40% 60% 50%; transform: rotate(-6deg); }
  .bow-r { right: 2px; border-radius: 30% 60% 60% 50% / 40% 70% 50% 60%; transform: rotate(6deg); }
  .bow-knot {
    position: absolute; left: 50%; top: 6px; transform: translateX(-50%);
    width: 16px; height: 18px; border-radius: 5px; z-index: 2;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
    box-shadow: 0 2px 5px rgba(0,0,0,0.4);
  }
  .bow-tail {
    position: absolute; top: 20px; width: 12px; height: 26px;
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
  }
  .bow-tl { left: 28px; transform: skewX(14deg) rotate(6deg); border-radius: 0 0 4px 8px; }
  .bow-tr { right: 28px; transform: skewX(-14deg) rotate(-6deg); border-radius: 0 0 8px 4px; }
  .is-opening .gift-bow { transition: transform 0.5s ease, opacity 0.5s ease; transform: translateX(-50%) translateY(-40px) scale(1.3); opacity: 0; }

  /* tag */
  .gift-tag {
    position: absolute; top: -54px; right: -34px;
    display: flex; flex-direction: column; gap: 4px;
    padding: 13px 17px; border-radius: 4px; min-width: 122px;
    background: linear-gradient(160deg, oklch(0.93 0.02 90), oklch(0.86 0.03 88));
    color: oklch(0.28 0.04 285);
    box-shadow: 0 14px 26px -14px rgba(0,0,0,0.7);
    transform: rotate(7deg);
    z-index: 5;
    transition: opacity 0.5s ease;
  }
  .gift-tag::before {
    content: ""; position: absolute; top: -26px; right: 16px;
    width: 1px; height: 30px; background: var(--line);
    transform: rotate(18deg); transform-origin: bottom;
  }
  .gift-tag::after {
    content: ""; position: absolute; top: 7px; right: 10px;
    width: 7px; height: 7px; border-radius: 50%;
    border: 1.5px solid oklch(0.5 0.04 285); background: transparent;
  }
  .is-opening .gift-tag { opacity: 0; }
  .gt-no { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; color: var(--gold-deep); }
  .gt-no i { font-style: normal; opacity: 0.6; }
  .gt-to { font-family: var(--script); font-size: 26px; line-height: 1.05; color: oklch(0.3 0.05 350); white-space: nowrap; margin: 1px 0; }
  .gt-line { font-family: var(--serif); font-style: italic; font-size: 12px; color: oklch(0.4 0.03 285); }

  /* prompt */
  .gift-prompt { display: flex; flex-direction: column; align-items: center; gap: 9px; text-align: center; animation: promptFloat 2.6s ease-in-out infinite; }
  @keyframes promptFloat { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-7px) } }
  .is-opening .gift-prompt { animation: none; opacity: 0; transition: opacity 0.4s; }
  .gp-main { font-family: var(--serif); font-style: italic; font-size: clamp(20px, 3vw, 28px); color: var(--ink); white-space: nowrap; }
  .gp-sub { font-family: var(--sans); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); opacity: 0.8; }

  @media (max-width: 600px) {
    .ring-cap { min-width: 70vw; }
    .tilt-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    .gift-tag { right: -14px; }
  }

  /* ===================================================================== */
  /* Tweaks panel (adapted from tweaks-panel.jsx — host protocol replaced   */
  /* with a local toggle + localStorage persistence)                       */
  /* ===================================================================== */
  .twk-fab { position: fixed; right: 16px; bottom: 16px; z-index: 90;
    width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
    cursor: pointer; border: 1px solid var(--line); color: var(--gold);
    background: oklch(0.2 0.03 280 / 0.55); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.7); opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s; }
  .twk-fab:hover { opacity: 1; transform: translateY(-2px); }
  .twk-fab svg { width: 20px; height: 20px; }

  /* fullscreen toggle (bottom-left), mirrors the tweaks fab */
  .proj-fab { position: fixed; left: 16px; bottom: 16px; z-index: 90;
    width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
    cursor: pointer; border: 1px solid var(--line); color: var(--gold);
    background: oklch(0.2 0.03 280 / 0.55); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.7); opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s; }
  .proj-fab:hover { opacity: 1; transform: translateY(-2px); }
  .proj-fab svg { width: 19px; height: 19px; }

  /* music toggle (bottom-left, stacked above fullscreen) */
  .music-fab { position: fixed; left: 16px; bottom: 66px; z-index: 90;
    width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
    cursor: pointer; border: 1px solid var(--line); color: var(--gold);
    background: oklch(0.2 0.03 280 / 0.55); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.7); opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s; }
  .music-fab:hover { opacity: 1; transform: translateY(-2px); }
  .music-fab svg { width: 19px; height: 19px; }

  /* presenting: hide cursor + controls when idle so the reveal stays clean */
  body.idle, body.idle * { cursor: none !important; }
  body.idle .twk-fab, body.idle .proj-fab, body.idle .music-fab { opacity: 0; pointer-events: none; }

  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

  /* ===================== new journey scenes ===================== */
.loc-scene{position:relative;overflow:hidden;width:100%;box-sizing:border-box;}
.loc-scene *{box-sizing:border-box;}
.loc-stage{position:relative;width:100%;height:100svh;min-height:560px;max-width:100%;overflow:hidden;display:block;}
.loc-map-wrap{position:absolute;inset:0;overflow:hidden;}
.loc-map{position:absolute;inset:0;width:100%;height:100%;display:block;transform:scale(1);filter:brightness(.82) saturate(.9);will-change:transform,filter;}
.loc-map.loc-fly{transform:scale(7);filter:brightness(1.08) saturate(1.12);transition:transform 2.6s cubic-bezier(.62,.02,.55,1),filter 2.6s cubic-bezier(.62,.02,.55,1);}

/* twinkling window lights */
.loc-win{animation:loc-flicker 4.2s ease-in-out infinite;transform-origin:center;}
@keyframes loc-flicker{0%,100%{opacity:.92;}45%{opacity:.62;}70%{opacity:1;}}
.loc-star{animation:loc-twinkle 3.6s ease-in-out infinite;}
@keyframes loc-twinkle{0%,100%{opacity:.25;}50%{opacity:1;}}

/* hero glow breathing */
.loc-hglow{animation:loc-breathe 5s ease-in-out infinite;transform-origin:center;}
@keyframes loc-breathe{0%,100%{opacity:.85;}50%{opacity:1;}}

/* dropping map pin */
.loc-pin{animation:loc-drop 1.4s cubic-bezier(.34,1.56,.64,1) .2s both;transform-origin:center bottom;}
@keyframes loc-drop{0%{transform:translateY(-46px) scale(.7);opacity:0;}60%{transform:translateY(4px) scale(1.04);opacity:1;}80%{transform:translateY(-2px) scale(.99);}100%{transform:translateY(0) scale(1);opacity:1;}}
.loc-pinpulse{animation:loc-ping 2.6s ease-out infinite;transform-origin:center;transform-box:fill-box;}
@keyframes loc-ping{0%{opacity:0;transform:scale(.4);}30%{opacity:.7;}100%{opacity:0;transform:scale(2.1);}}

/* descending vignette + warm veil */
.loc-vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 200px 70px rgba(4,8,22,.85);opacity:.65;transition:opacity 2.6s ease,box-shadow 2.6s ease;}
.loc-stage.loc-active .loc-vig{opacity:.92;box-shadow:inset 0 0 320px 120px rgba(4,8,22,.9);}
.loc-glow-veil{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(255,206,134,0) 0%,rgba(255,184,107,0) 26%,rgba(4,8,22,0) 62%);opacity:0;transition:opacity 2.6s ease;}
.loc-stage.loc-active .loc-glow-veil{opacity:1;background:radial-gradient(circle at 50% 50%,rgba(255,206,134,.22) 0%,rgba(255,184,107,.1) 26%,rgba(4,8,22,0) 62%);}

/* label */
.loc-label{position:absolute;left:50%;bottom:11%;transform:translate(-50%,18px);text-align:center;opacity:0;pointer-events:none;transition:opacity 1.1s ease,transform 1.1s cubic-bezier(.22,1,.36,1);z-index:5;padding:0 24px;width:100%;max-width:90vw;}
.loc-stage.loc-revealed .loc-label{opacity:1;transform:translate(-50%,0);}
.loc-kicker{font-family:var(--script,cursive);color:var(--gold-bright,#f3d18b);font-size:clamp(26px,4.4vw,52px);line-height:1.1;text-shadow:0 2px 18px rgba(255,196,110,.4);letter-spacing:.5px;}
.loc-line{font-family:var(--serif,serif);color:var(--ink,#f5f3ec);font-size:clamp(20px,3vw,40px);font-weight:500;margin-top:.35em;letter-spacing:.4px;text-shadow:0 2px 24px rgba(0,0,0,.6);}
.loc-em{font-style:italic;color:var(--gold,#d9b46a);}
.loc-rule{width:0;height:1px;margin:1em auto 0;background:linear-gradient(90deg,transparent,var(--gold,#d9b46a),transparent);transition:width 1.4s ease .3s;}
.loc-stage.loc-revealed .loc-rule{width:min(260px,60vw);}

@media (prefers-reduced-motion:reduce){
  .loc-map{transform:scale(1);transition:none;}
  .loc-map.loc-fly{transform:scale(3.4);transition:transform .5s ease,filter .5s ease;}
  .loc-win,.loc-star,.loc-hglow,.loc-pinpulse{animation:none;}
  .loc-pin{animation:none;}
  .loc-label{transition:opacity .4s ease;}
  .loc-rule{transition:width .4s ease;}
}
.door-stage{position:relative;width:100%;max-width:1100px;margin:0 auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:clamp(16px,3vh,28px);box-sizing:border-box}
.door-frame{position:relative;width:min(58vw,400px);height:min(64vh,560px);max-height:62svh;perspective:1200px;perspective-origin:50% 42%;flex:0 0 auto}
.door-frame::before{content:"";position:absolute;inset:-3.5%;border-radius:18px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.02);background:linear-gradient(180deg,var(--bg-2),var(--bg-1));pointer-events:none}
.door-interior{position:absolute;inset:2%;border-radius:12px;overflow:hidden;background:radial-gradient(120% 80% at 50% 35%,#4a2f10 0%,#2a1a08 40%,#120c06 75%,#0a0805 100%)}
.door-party{position:absolute;inset:0;opacity:0;transition:opacity 1s ease .55s;background:radial-gradient(80% 60% at 50% 30%,rgba(255,214,140,.55),rgba(255,170,90,.18) 45%,transparent 72%),linear-gradient(180deg,rgba(40,26,10,.2),rgba(10,8,5,.7))}
.door-party.door-on{opacity:1}
.door-glints{position:absolute;inset:0;opacity:0;transition:opacity 1s ease .6s}
.door-glints.door-on{opacity:1}
.door-glint{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px rgba(255,224,160,.9)}
.door-bloom{position:absolute;left:50%;top:42%;width:8px;height:60%;transform:translate(-50%,-50%) scaleX(1);opacity:.85;border-radius:50%;background:linear-gradient(180deg,transparent,rgba(255,228,170,.95) 18%,rgba(255,210,130,.95) 50%,rgba(255,228,170,.95) 82%,transparent);filter:blur(2px);box-shadow:0 0 26px 10px rgba(255,206,120,.7);transition:transform 1.6s cubic-bezier(.6,0,.25,1) .15s,opacity 1.6s ease .15s;pointer-events:none}
.door-bloom.door-on{transform:translate(-50%,-50%) scaleX(38);opacity:0}
.door-leaf{position:absolute;top:0;width:50%;height:100%;transform-style:preserve-3d;will-change:transform;backface-visibility:hidden;transition:transform 1.7s cubic-bezier(.5,.02,.2,1)}
.door-leaf-l{left:0;transform-origin:left center;transform:rotateY(0deg)}
.door-leaf-r{right:0;transform-origin:right center;transform:rotateY(0deg)}
.door-frame.door-open .door-leaf-l{transform:rotateY(-105deg)}
.door-frame.door-open .door-leaf-r{transform:rotateY(105deg)}
.door-panel{position:absolute;inset:0;border-radius:10px;overflow:hidden;background:linear-gradient(155deg,#16213f 0%,#0f1830 50%,#0a1124 100%);box-shadow:inset 0 0 0 2px rgba(201,162,77,.45),inset 0 0 40px rgba(0,0,0,.55),0 18px 40px rgba(0,0,0,.5)}
.door-leaf-l .door-panel{border-top-left-radius:14px;border-bottom-left-radius:14px}
.door-leaf-r .door-panel{border-top-right-radius:14px;border-bottom-right-radius:14px}
.door-inlay{position:absolute;inset:8% 10%;border-radius:6px;border:1.5px solid rgba(201,162,77,.55);box-shadow:inset 0 0 0 1px rgba(201,162,77,.18)}
.door-inlay::after{content:"";position:absolute;inset:9%;border-radius:4px;border:1px solid rgba(201,162,77,.35)}
.door-sheen{position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(255,235,190,.10) 47%,rgba(255,235,190,.16) 50%,transparent 66%);pointer-events:none}
.door-handle{position:absolute;top:50%;width:10px;height:64px;border-radius:6px;background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright),var(--gold-deep));box-shadow:0 0 10px rgba(230,190,110,.5),inset 0 0 4px rgba(255,255,255,.4);transform:translateY(-50%)}
.door-handle::after{content:"";position:absolute;left:50%;top:-13px;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold-bright),var(--gold-deep));transform:translateX(-50%);box-shadow:0 0 8px rgba(230,190,110,.5)}
.door-leaf-l .door-handle{right:9%}
.door-leaf-r .door-handle{left:9%}
.door-mono{position:absolute;left:50%;top:30%;transform:translateX(-50%);font-family:var(--script);font-size:clamp(26px,5.6vw,52px);line-height:1;color:var(--gold-bright);text-shadow:0 0 14px rgba(230,190,110,.55);opacity:.95}
.door-heart{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:30px}
.door-seam{position:absolute;left:50%;top:0;width:6px;height:100%;transform:translateX(-50%);background:linear-gradient(180deg,transparent,rgba(255,224,160,.9) 12%,rgba(255,236,190,1) 50%,rgba(255,224,160,.9) 88%,transparent);filter:blur(1.5px);box-shadow:0 0 16px 4px rgba(255,206,120,.7);opacity:.9;z-index:5;pointer-events:none;transition:opacity .7s ease}
.door-frame.door-open .door-seam{opacity:0;transition:opacity .35s ease}
.door-line{font-family:var(--serif);font-size:clamp(24px,4.2vw,44px);color:var(--ink);letter-spacing:.02em;text-align:center;opacity:0;transform:translateY(14px);transition:opacity 1s ease 1.15s,transform 1s ease 1.15s;text-shadow:0 2px 18px rgba(0,0,0,.5);max-width:90vw}
.door-line .door-nm{font-family:var(--script);color:var(--gold-bright);font-size:1.32em;text-shadow:0 0 18px rgba(230,190,110,.5)}
.door-line.door-on{opacity:1;transform:translateY(0)}
.door-spark{position:absolute;bottom:8%;width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,#fff,var(--gold-bright));box-shadow:0 0 10px 2px rgba(230,190,110,.8);opacity:0;pointer-events:none;will-change:transform,opacity}
@media (prefers-reduced-motion:reduce){
.door-leaf,.door-bloom,.door-line,.door-party,.door-glints,.door-seam{transition-duration:.01ms !important}
.door-spark{display:none}
}
.room-scene{position:relative;width:100%;overflow:hidden;padding:0;justify-content:flex-start;background:
  radial-gradient(120% 90% at 50% -10%, rgba(212,175,120,.16), transparent 60%),
  radial-gradient(90% 70% at 12% 110%, rgba(214,128,150,.12), transparent 65%),
  radial-gradient(90% 70% at 88% 110%, rgba(120,150,210,.10), transparent 65%),
  linear-gradient(180deg, var(--bg-1), var(--bg-0) 60%, var(--bg-2));
}
.room-stage{position:relative;width:100%;flex:1 1 auto;min-height:100svh;display:flex;flex-direction:column;align-items:center;}

/* soft warm floor glow + vignette */
.room-vignette{position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(140% 120% at 50% 120%, rgba(212,175,120,.10), transparent 55%);
  box-shadow:inset 0 0 220px 40px rgba(8,12,28,.55);}
.room-dust{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden;}
.room-dust i{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(245,230,200,.55);
  filter:blur(.4px);opacity:0;animation:room-float-dust linear infinite;}
@keyframes room-float-dust{0%{opacity:0;transform:translateY(10px)}15%{opacity:.7}85%{opacity:.5}100%{opacity:0;transform:translateY(-90px)}}

/* ===== Bunting / banner ===== */
.room-bunting{position:relative;z-index:6;width:100%;max-width:1300px;margin:0 auto;padding:10px 24px 0;
  display:flex;justify-content:center;align-items:flex-start;}
.room-bunting svg{display:block;width:100%;height:84px;overflow:visible;}
.room-flag{transform-box:fill-box;transform-origin:top center;opacity:0;transform:translateY(-26px) scale(.6);}
.room-in .room-flag{animation:room-flag-in .6s cubic-bezier(.2,.9,.25,1.1) forwards, room-flag-sway 4.4s ease-in-out infinite;}
@keyframes room-flag-in{to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes room-flag-sway{0%,100%{rotate:-2deg}50%{rotate:2deg}}
.room-flag text{font-family:var(--serif);font-weight:700;fill:#fff7ec;font-size:21px;}

/* ===== Photo garland ===== */
.room-garland{position:relative;z-index:7;width:100%;max-width:1280px;margin:6px auto 0;padding:0 26px;}
.room-wire{position:absolute;left:26px;right:26px;top:14px;height:46px;pointer-events:none;}
.room-wire svg{width:100%;height:100%;overflow:visible;}
.room-cards{position:relative;display:flex;justify-content:center;flex-wrap:wrap;gap:14px;padding-top:30px;}
.room-card{position:relative;width:clamp(112px,12vw,162px);background:linear-gradient(180deg,#fcf7ee,#efe5d4);
  padding:9px 9px 30px;border-radius:6px;box-shadow:0 14px 30px rgba(6,10,24,.5),0 2px 0 rgba(255,255,255,.4) inset;
  transform-origin:top center;cursor:pointer;opacity:0;
  transition:filter .3s ease, box-shadow .3s ease;}
.room-in .room-card{animation:room-card-in .7s cubic-bezier(.2,.85,.3,1.05) forwards, room-card-sway 5s ease-in-out infinite;}
.room-card:hover{filter:brightness(1.05);box-shadow:0 20px 38px rgba(6,10,24,.6);}
@keyframes room-card-in{0%{opacity:0;transform:translateY(-22px) rotate(var(--rot)) scale(.82)}100%{opacity:1;transform:translateY(0) rotate(var(--rot)) scale(1)}}
@keyframes room-card-sway{0%,100%{rotate:calc(var(--sway)*-1)}50%{rotate:var(--sway)}}
.room-card-frame{position:relative;width:100%;aspect-ratio:1/1;border-radius:4px;overflow:hidden;background:#1a2238;
  box-shadow:0 0 0 1px rgba(0,0,0,.08) inset;}
.room-cap{position:absolute;left:0;right:0;bottom:7px;text-align:center;font-family:var(--script);
  font-size:15px;color:#4a3f33;line-height:1;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.room-pin{position:absolute;top:-13px;left:50%;width:13px;height:24px;transform:translateX(-50%) rotate(var(--protate,0deg));
  z-index:3;pointer-events:none;}
.room-pin::before{content:"";position:absolute;inset:0;border-radius:5px;
  background:linear-gradient(180deg,#caa86a,#9c7c44);box-shadow:0 2px 4px rgba(0,0,0,.4);}
.room-pin::after{content:"";position:absolute;left:50%;top:7px;width:2px;height:10px;transform:translateX(-50%);
  background:rgba(70,50,20,.5);border-radius:2px;}

/* ===== Balloons ===== */
.room-balloons{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden;}
.room-balloon{position:absolute;pointer-events:auto;cursor:pointer;opacity:0;will-change:transform;
  --bw:64px;--bh:80px;width:var(--bw);}
.room-in .room-balloon{animation:room-balloon-in .7s ease forwards;}
@keyframes room-balloon-in{from{opacity:0;transform:translateY(28px) scale(.6)}to{opacity:1;transform:translateY(0) scale(1)}}
.room-balloon-bob{animation:room-bob ease-in-out infinite;transform-origin:center top;}
.room-balloon.room-drift .room-balloon-bob{animation:room-bob ease-in-out infinite, room-rise linear infinite;}
@keyframes room-bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-16px) rotate(3deg)}}
@keyframes room-rise{0%{margin-top:0}100%{margin-top:-30px}}
.room-balloon-body{position:relative;width:var(--bw);height:var(--bh);border-radius:50% 50% 48% 48%/55% 55% 45% 45%;
  background:radial-gradient(38% 32% at 32% 26%, rgba(255,255,255,.85), rgba(255,255,255,0) 55%),
            radial-gradient(120% 120% at 50% 30%, var(--c1), var(--c2));
  box-shadow:0 10px 22px rgba(6,10,24,.4), inset -8px -10px 18px rgba(0,0,0,.18);}
.room-balloon-body::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:9px solid var(--c2);}
.room-balloon-string{position:absolute;left:50%;top:calc(var(--bh) + 1px);width:30px;height:60px;transform:translateX(-50%);overflow:visible;}
.room-balloon-string path{stroke:rgba(255,255,255,.32);stroke-width:1.4;fill:none;}
.room-balloon.room-pop{animation:room-pop-out .28s ease forwards !important;}
.room-balloon.room-pop .room-balloon-bob{animation:none !important;}
@keyframes room-pop-out{to{opacity:0;transform:scale(1.35);filter:blur(2px)}}

/* heart burst */
.room-heart{position:absolute;z-index:130;font-size:18px;color:var(--rose);pointer-events:none;
  text-shadow:0 0 8px rgba(214,128,150,.6);will-change:transform,opacity;animation:room-heart-up var(--dur,1100ms) ease-out forwards;}
@keyframes room-heart-up{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  18%{opacity:1;transform:translate(calc(-50% + var(--dx)*.3),calc(-50% - 18px)) scale(1)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% - var(--rise))) scale(.9)}}

/* ===== Lightbox ===== */
.room-lightbox{position:fixed;inset:0;z-index:140;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,9,20,.82);backdrop-filter:blur(6px);opacity:0;transition:opacity .32s ease;cursor:zoom-out;padding:24px;}
.room-lightbox.room-show{opacity:1;}
.room-lb-card{transform:scale(.9);transition:transform .36s cubic-bezier(.2,.9,.3,1.05);
  background:linear-gradient(180deg,#fcf7ee,#ece2d0);padding:16px 16px 22px;border-radius:10px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);max-width:min(74vw,540px);max-height:84vh;display:flex;flex-direction:column;}
.room-lightbox.room-show .room-lb-card{transform:scale(1);}
.room-lb-img{width:min(70vw,500px);max-width:100%;aspect-ratio:1/1;border-radius:6px;overflow:hidden;background:#1a2238;}
.room-lb-img img{width:100%;height:100%;object-fit:cover;display:block;}
.room-lb-cap{margin-top:12px;text-align:center;font-family:var(--script);font-size:clamp(20px,3vw,30px);color:#4a3f33;}
.room-lb-hint{margin-top:6px;text-align:center;font-family:var(--sans);font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;color:#8a7b66;}

@media (prefers-reduced-motion: reduce){
  .room-in .room-flag,.room-in .room-card,.room-balloon-bob,.room-balloon.room-drift .room-balloon-bob{animation:none !important;}
  .room-in .room-flag{opacity:1;transform:none}
  .room-in .room-card{opacity:1;transform:none}
  .room-in .room-balloon{animation:none !important;opacity:1;transform:none}
  .room-dust i{display:none}
}
/* ===== Scene: Cut the cake (bright finale) ===== */
.cake-bright{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(1200px 700px at 50% 12%, #fff7ef 0%, rgba(255,247,239,0) 60%),
    radial-gradient(900px 600px at 18% 90%, #ffd6e8 0%, rgba(255,214,232,0) 55%),
    radial-gradient(900px 600px at 85% 85%, #ffe9b8 0%, rgba(255,233,184,0) 55%),
    linear-gradient(160deg, #ffe7c2 0%, #ffd1e3 48%, #ffc1d6 100%);
  color:#5a2e3e;
  text-align:center;
  isolation:isolate;
}

.cake-wrap{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(8px,1.6vh,18px);

.cake-eyebrow{

  line-height:1;
  margin:0;
  opacity:0;
  transform:translateY(14px);
  transition:opacity .7s ease, transform .7s ease;
}
.cake-eyebrow.cake-show{ opacity:1; transform:none; }

.cake-prompt{
  font-family:var(--sans,'Outfit',sans-serif);
  font-weight:600;
  letter-spacing:.04em;
  font-size:clamp(14px,2.2vw,21px);

  transform:translateY(8px) scale(.96);
  transition:opacity .45s ease, transform .45s ease;
}
.cake-prompt.cake-show{ opacity:1; transform:none; }

/* stage holds cake + knife */
.cake-stage{
  position:relative;
  width:min(64vw, 400px);
  max-width:min(64vw, 400px);
  aspect-ratio:1 / 1;
  max-height:min(48svh, 400px);

  transform:translateY(36px) scale(.92);

.cake-stage.cake-show{ opacity:1; transform:none; }

.cake-svg{ width:100%; height:100%; display:block; overflow:visible; }
.cake-tap-target{ cursor:pointer; }

/* candle flames flicker */
.cake-flame{ transform-origin:center bottom; }
.cake-glow{ transition:opacity .4s ease; }
.cake-f1{ animation:cake-flick 1.1s ease-in-out infinite; }
.cake-f2{ animation:cake-flick 1.3s ease-in-out infinite .15s; }
.cake-f3{ animation:cake-flick 1.0s ease-in-out infinite .3s; }
.cake-f4{ animation:cake-flick 1.25s ease-in-out infinite .1s; }
.cake-f5{ animation:cake-flick 1.15s ease-in-out infinite .22s; }
@keyframes cake-flick{
  0%,100%{ transform:scaleY(1) scaleX(1) translateX(0); }
  25%{ transform:scaleY(1.12) scaleX(.92) translateX(-.6px); }
  50%{ transform:scaleY(.94) scaleX(1.06) translateX(.6px); }
  75%{ transform:scaleY(1.06) scaleX(.96) translateX(-.3px); }
}
.cake-flame-group{ transition:opacity .35s ease, transform .35s ease; transform-origin:center bottom; }
.cake-out{ opacity:0 !important; transform:scaleY(.2) translateY(6px); animation:none !important; }

.cake-smoke{ transition:opacity .3s ease; }
.cake-smoke.cake-rise{ animation:cake-smoke 1.6s ease-out forwards; }
@keyframes cake-smoke{
  0%{ opacity:0; transform:translateY(0) scale(.6); }
  20%{ opacity:.7; }
  100%{ opacity:0; transform:translateY(-26px) scale(1.25); }
}

/* slice that slides out */
.cake-slice-group{
  opacity:0;
  transform:translate(0,0);
  transition:transform 1s cubic-bezier(.2,.8,.25,1), opacity .3s ease;
}
.cake-slice-group.cake-slide{
  opacity:1;
  transform:translate(78px,46px) rotate(7deg);
}
.cake-cutline{ opacity:0; transition:opacity .25s ease; }
.cake-cutline.cake-show{ opacity:.5; }

/* knife */
.cake-knife{
  position:absolute;
  left:50%;
  top:-12%;
  width:14%;
  min-width:42px;
  transform:translate(-50%,0) rotate(8deg);
  transform-origin:top center;
  opacity:0;
  pointer-events:none;
  z-index:5;
  cursor:grab;
  touch-action:none;
  filter:drop-shadow(0 8px 10px rgba(90,40,60,.35));
  transition:opacity .5s ease;
}
.cake-knife.cake-show{ opacity:1; pointer-events:auto; }
.cake-grabbing{ cursor:grabbing; }
.cake-knife-hint{ animation:cake-bob 1.6s ease-in-out infinite; }
@keyframes cake-bob{
  0%,100%{ transform:translate(-50%,0) rotate(8deg); }
  50%{ transform:translate(-50%,16px) rotate(8deg); }
}

/* finale headline overlay */
.cake-finale{
  position:absolute;
  inset:0;
  z-index:6;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:.1em;
  padding:5vw;
  box-sizing:border-box;
  pointer-events:none;
  opacity:0;
  transform:scale(.9);
  transition:opacity .7s ease, transform .9s cubic-bezier(.2,.8,.25,1);
}
.cake-finale.cake-show{ opacity:1; transform:none; }
/* when the cake is cut, fade it back so the name is the hero */
.cake-finished .cake-stage{ opacity:.14; filter:saturate(.85); transition:opacity .7s ease .15s, filter .7s ease .15s; }
.cake-finished .cake-eyebrow, .cake-finished .cake-prompt{ opacity:0 !important; transition:opacity .4s ease; }
.cake-hb-script{
  font-family:var(--script,'Great Vibes',cursive);
  font-size:clamp(30px,6vw,72px);
  color:#e0567f;
  line-height:1;
  text-shadow:0 3px 0 rgba(255,255,255,.6);
}
.cake-hb-name{
  font-family:var(--serif,'Cormorant Garamond',serif);
  font-weight:700;
  font-size:clamp(40px,11vw,140px);
  line-height:.96;
  letter-spacing:.01em;
  max-width:94vw;
  overflow-wrap:break-word;
  word-break:break-word;
  background:linear-gradient(120deg,#ff5f9e 0%,#ff8a3d 45%,#ffc233 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  text-shadow:0 6px 26px rgba(255,120,160,.35);
  animation:cake-bloom 1s cubic-bezier(.2,.9,.2,1) both;
}
@keyframes cake-bloom{
  0%{ transform:scale(.6) translateY(18px); opacity:0; }
  60%{ transform:scale(1.06); opacity:1; }
  100%{ transform:scale(1); }
}
.cake-sub{
  margin-top:.4em;
  font-family:var(--sans,'Outfit',sans-serif);
  font-weight:500;
  font-size:clamp(13px,2vw,18px);
  color:#8a4660;
  letter-spacing:.06em;
}

/* controls */
.cake-controls{
  position:absolute;
  left:0; right:0;
  bottom:clamp(74px, 13vh, 140px);
  z-index:5;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:opacity .5s ease .2s, transform .5s ease .2s;
}
.cake-controls.cake-show{ opacity:1; pointer-events:auto; transform:none; }
.cake-btn{
  font-family:var(--sans,'Outfit',sans-serif);
  font-weight:600;
  font-size:clamp(13px,1.8vw,17px);
  letter-spacing:.03em;
  color:#fff;
  border:none;
  border-radius:999px;
  padding:.7em 1.6em;
  cursor:pointer;
  background:linear-gradient(120deg,#ff6aa0,#ff8a3d);
  box-shadow:0 8px 22px rgba(220,80,120,.35);
  transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
}
.cake-btn:hover{ transform:translateY(-2px); filter:brightness(1.05); box-shadow:0 12px 28px rgba(220,80,120,.42); }
.cake-btn:active{ transform:translateY(0); }
.cake-btn.cake-ghost{
  background:rgba(255,255,255,.7);
  color:#c24a72;
  box-shadow:0 6px 18px rgba(200,90,130,.22);
}

.cake-made{
  position:absolute;
  left:0; right:0;
  bottom:clamp(26px, 6vh, 58px);
  z-index:5;
  font-family:var(--script,'Great Vibes',cursive);
  font-size:clamp(20px,3.2vw,34px);
  color:#cf5a86;
  margin:0;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .8s ease .3s, transform .8s ease .3s;
}
.cake-made.cake-show{ opacity:1; transform:none; }

/* floating balloons */
.cake-decor{ position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
.cake-balloon{
  position:absolute;
  bottom:-70px;
  width:clamp(30px,4vw,52px);
  opacity:.85;
  filter:drop-shadow(0 6px 8px rgba(180,70,110,.18));
  animation-name:cake-float;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
  will-change:transform;
}
@keyframes cake-float{
  0%{ transform:translateY(0) translateX(0) rotate(-2deg); }
  50%{ transform:translateY(-58vh) translateX(18px) rotate(3deg); }
  100%{ transform:translateY(-118vh) translateX(-10px) rotate(-2deg); }
}

@media (prefers-reduced-motion: reduce){
  .cake-f1,.cake-f2,.cake-f3,.cake-f4,.cake-f5,
  .cake-balloon,.cake-knife-hint,.cake-smoke.cake-rise{ animation:none !important; }
  .cake-stage,.cake-eyebrow,.cake-prompt,.cake-finale,
  .cake-controls,.cake-made,.cake-slice-group{ transition-duration:.25s !important; }
  .cake-hb-name{ animation-duration:.3s; }
}
</style>
</head>

    var canvas = document.getElementById('ambient-canvas');
    var ctx = canvas.getContext('2d');
    var raf, W, H, DPR;
    var motes = [], boke = [];
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.width = window.innerWidth * DPR;
      H = canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);
    var count = window.innerWidth < 640 ? 50 : 95;
    for (var i = 0; i < count; i++) motes.push({
      x: Math.random() * W, y: Math.random() * H,
      r: (Math.random() * 1.6 + 0.4) * DPR,
      vy: -(Math.random() * 0.25 + 0.05) * DPR,
      vx: (Math.random() - 0.5) * 0.2 * DPR,
      a: Math.random() * 0.6 + 0.15,
      tw: Math.random() * Math.PI * 2, tws: Math.random() * 0.03 + 0.008
    });
    for (var j = 0; j < 8; j++) boke.push({
      x: Math.random() * W, y: Math.random() * H,
      r: (Math.random() * 100 + 60) * DPR,
      vy: -(Math.random() * 0.12 + 0.03) * DPR,
      vx: (Math.random() - 0.5) * 0.1 * DPR,
      a: Math.random() * 0.045 + 0.015
    });
    function tick() {
      ctx.clearRect(0, 0, W, H);
      for (var b, bi = 0; bi < boke.length; bi++) {
        b = boke[bi];
        b.x += b.vx; b.y += b.vy;
        if (b.y + b.r < 0) { b.y = H + b.r; b.x = Math.random() * W; }
        var g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        g.addColorStop(0, 'rgba(232,200,121,' + b.a + ')');
        g.addColorStop(1, 'rgba(232,200,121,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      }
      for (var m, mi = 0; mi < motes.length; mi++) {
        m = motes[mi];
        m.x += m.vx; m.y += m.vy; m.tw += m.tws;
        if (m.y + m.r < 0) { m.y = H + m.r; m.x = Math.random() * W; }
        if (m.x < -10) m.x = W + 10; if (m.x > W + 10) m.x = -10;
        var tw = Math.sin(m.tw) * 0.4 + 0.6;
        ctx.globalAlpha = m.a * tw;
        ctx.fillStyle = '#f0d089';
        ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      raf = requestAnimationFrame(tick);
    }
    tick();
  }

  /* ---------- Confetti burst engine (global) ---------- */
  (function setupConfetti() {
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var parts = [];
    var running = false;
    var COLORS = ['#e8c879', '#f4dca0', '#d9a441', '#f6f1e6', '#e0a0a8', '#cdb8e8'];
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var p, i = 0; i < parts.length; i++) {
        p = parts[i];
        p.vy += 0.12 * DPR;
        p.vx *= 0.992;
        p.x += p.vx; p.y += p.vy;
        p.rot += p.vr;
        p.life -= 1;
        var alpha = Math.max(0, Math.min(1, p.life / 60));
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        if (p.shape === 0) ctx.fillRect(-p.s, -p.s * 0.5, p.s * 2, p.s);
        else { ctx.beginPath(); ctx.arc(0, 0, p.s, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      }
      parts = parts.filter(function (p) { return p.life > 0 && p.y < canvas.height + 40; });
      if (parts.length > 0) requestAnimationFrame(loop);
      else { running = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
    }
    window.fireConfetti = function (opts) {
      opts = opts || {};
      var count = opts.count == null ? 130 : opts.count;
      var originX = opts.originX == null ? 0.5 : opts.originX;
      var originY = opts.originY == null ? 0.42 : opts.originY;
      var spread = opts.spread == null ? 1 : opts.spread;
      var power = opts.power == null ? 1 : opts.power;
      var ox = originX * canvas.width;
      var oy = originY * canvas.height;
      for (var i = 0; i < count; i++) {
        var ang = (-Math.PI / 2) + (Math.random() - 0.5) * Math.PI * spread;
        var speed = (Math.random() * 7 + 5) * DPR * power;
        parts.push({
          x: ox + (Math.random() - 0.5) * 40 * DPR,
          y: oy,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed - Math.random() * 3 * DPR,
          s: (Math.random() * 4 + 3) * DPR,
          color: COLORS[(Math.random() * COLORS.length) | 0],
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.3,
          life: Math.random() * 60 + 90,
          shape: Math.random() < 0.7 ? 0 : 1
        });
      }
      if (!running) { running = true; requestAnimationFrame(loop); }
    };
    window.rainConfetti = function (count) {
      count = count == null ? 60 : count;
      for (var i = 0; i < count; i++) {
        parts.push({
          x: Math.random() * canvas.width,
          y: -20 * DPR,
          vx: (Math.random() - 0.5) * 1.5 * DPR,
          vy: (Math.random() * 2 + 1) * DPR,
          s: (Math.random() * 4 + 3) * DPR,
          color: COLORS[(Math.random() * COLORS.length) | 0],
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.25,
          life: 400,
          shape: Math.random() < 0.7 ? 0 : 1
        });
      }
      if (!running) { running = true; requestAnimationFrame(loop); }
    };
  })();

  <script>
  /* ---------- Fireworks engine (global): fireFireworks / fireworksShow ---------- */
  (function setupFireworks() {
    var canvas = document.getElementById('fireworks-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var rockets = [], sparks = [], running = false;
    var COLORS = ['#e8c879', '#f4dca0', '#ff6b9d', '#ffd36b', '#6bd3ff', '#b388ff', '#7cfca0', '#ff8d5a'];
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;

      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);
    function ensure() { if (!running) { running = true; requestAnimationFrame(loop); } }

      colors = colors || COLORS; count = count || 90; power = power || 1;
      var base = colors[(Math.random() * colors.length) | 0];
      for (var i = 0; i < count; i++) {
        var ang = Math.random() * Math.PI * 2;
        var sp = (Math.random() * 3.6 + 1.1) * DPR * power;
        sparks.push({ x: x, y: y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
          life: 60 + Math.random() * 45, max: 105,
          s: (Math.random() * 1.5 + 1.0) * DPR,
          color: Math.random() < 0.72 ? base : colors[(Math.random() * colors.length) | 0] });
      }
      if (sparks.length > 1600) sparks.splice(0, sparks.length - 1600);
      ensure();
    }
    function launchRocket(txFrac, tyFrac, colors) {
      var x = (txFrac != null ? txFrac : (0.15 + Math.random() * 0.7)) * canvas.width;
      var targetY = (tyFrac != null ? tyFrac : (0.16 + Math.random() * 0.32)) * canvas.height;
      rockets.push({ x: x, y: canvas.height + 8 * DPR, vy: -(Math.random() * 2.4 + 8.5) * DPR,
        targetY: targetY, colors: colors, trail: [] });
      ensure();
    }
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'lighter';
      for (var i = rockets.length - 1; i >= 0; i--) {
        var r = rockets[i];
        r.y += r.vy;
        r.trail.push({ x: r.x, y: r.y });
        if (r.trail.length > 7) r.trail.shift();
        for (var t = 0; t < r.trail.length; t++) {
          ctx.globalAlpha = (t / r.trail.length) * 0.7;
          ctx.fillStyle = '#fff3c4';
          ctx.beginPath(); ctx.arc(r.trail[t].x, r.trail[t].y, 1.6 * DPR, 0, 6.2832); ctx.fill();

        ctx.beginPath(); ctx.arc(r.x, r.y, 2.1 * DPR, 0, 6.2832); ctx.fill();
        if (r.y <= r.targetY) { explode(r.x, r.y, r.colors, 80 + (Math.random() * 50 | 0), 1); rockets.splice(i, 1); }
      }
      for (var j = sparks.length - 1; j >= 0; j--) {
        var p = sparks[j];
        p.vy += 0.036 * DPR; p.vx *= 0.985; p.vy *= 0.985;
        p.x += p.vx; p.y += p.vy; p.life--;

        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 6.2832); ctx.fill();

      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
      if (rockets.length || sparks.length) requestAnimationFrame(loop);
      else { running = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
    }
    window.fireFireworks = function (opts) {
      opts = opts || {};
      var x = (opts.x != null ? opts.x : Math.random()) * canvas.width;
      var y = (opts.y != null ? opts.y : (0.2 + Math.random() * 0.3)) * canvas.height;
      explode(x, y, opts.colors, opts.count || 90, opts.power || 1);
    };
    window.fireworksShow = function (ms) {
      ms = ms || 2500;
      var end = performance.now() + ms;
      (function volley() {
        launchRocket();
        if (Math.random() < 0.4) launchRocket();
        if (performance.now() < end) setTimeout(volley, 240 + Math.random() * 260);
      })();
    };
  })();
